<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MDC GAME 🪐</title>
<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--mdc:#ff6b00;--geo:#00d4aa;--rcwt:#cc44ff;--rcwe:#ff44cc;--bg:#030303;--bg2:#0a0a0a;--line:#1e1e1e;--muted:#555;--safe-b:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Share Tech Mono',monospace;}
body{display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);}
#hdr{flex-shrink:0;height:62px;background:linear-gradient(180deg,#0a0a0a,#050505);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;z-index:10;}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ff6b0055,transparent);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 16px;position:relative;z-index:2;}
#bnav{flex-shrink:0;background:#050505;border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe-b);height:calc(62px + var(--safe-b));position:relative;z-index:10;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;border-top:2px solid transparent;cursor:pointer;}
.ni{font-size:22px;line-height:1;transition:transform 0.2s;}
.nb.active .ni{transform:scale(1.15);}
.nl{font-size:9px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:1px;}

/* GAME OVERLAY */
#game-overlay{position:fixed;inset:0;z-index:100;display:none;background:#000;flex-direction:column;}
#game-canvas-wrap{flex:1;position:relative;overflow:hidden;}
#gc{display:block;width:100%;height:100%;}
#game-hud{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;pointer-events:none;}
.ghbox{background:rgba(0,0,0,0.7);border-radius:12px;padding:8px 14px;backdrop-filter:blur(8px);}
#g-hp-wrap{position:absolute;top:76px;left:16px;right:16px;pointer-events:none;}
#g-hp-bg{height:7px;background:#111;border-radius:4px;overflow:hidden;border:1px solid #222;}
#g-hp-fill{height:100%;border-radius:4px;transition:width 0.3s;}
#g-lives{position:absolute;top:96px;right:16px;pointer-events:none;display:flex;gap:4px;}
#g-dist{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:2px;pointer-events:none;font-family:'Orbitron',monospace;}
#g-pu{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border-radius:10px;padding:6px 16px;font-size:11px;letter-spacing:2px;border:1px solid #333;display:none;font-family:'Orbitron',monospace;white-space:nowrap;}
#g-diff-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:8px;font-family:'Orbitron',monospace;letter-spacing:2px;padding:3px 10px;border-radius:8px;pointer-events:none;}

/* ACHIEVEMENT POPUP */
#ach-popup{position:fixed;bottom:90px;right:12px;left:auto;transform:translateY(120px);z-index:999;background:linear-gradient(135deg,#0f1a0f,#080808);border:1px solid #00ff8855;border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:200px;box-shadow:0 0 20px #00ff8822;}
#ach-popup.show{transform:translateY(0);}

/* GAME SCREENS */
.gscreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
#gs-start{background:radial-gradient(ellipse at 50% 40%,#080220,#000 70%);}
#gs-over{background:radial-gradient(ellipse at center,#1a0505,#000 70%);display:none;}
#gs-pause{background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);display:none;}
#gs-leaderboard{background:radial-gradient(ellipse at center,#05101a,#000 70%);display:none;}

/* DIFFICULTY BUTTONS */
.dbtn{flex:1;padding:10px 6px;border-radius:12px;border:1px solid;font-family:'Orbitron',monospace;font-weight:900;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;background:transparent;text-align:center;}
.dbtn:active{transform:scale(0.95);}
.dbtn.selected{color:#000;}

/* SHARED UI */
#notif{position:fixed;top:72px;left:14px;right:14px;z-index:999;background:#0d0d0d;border-radius:12px;padding:12px 18px;font-size:13px;text-align:center;display:none;animation:ntfIn 0.3s ease;}
#modal{position:fixed;inset:0;z-index:990;background:#000000cc;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
#mbox{background:linear-gradient(180deg,#0f0f0f,#080808);border:1px solid #1e1e1e;border-radius:24px 24px 0 0;padding:24px 18px 44px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1);}
#mbox::before{content:'';display:block;width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;transition:transform 0.15s;}
.card:active{transform:scale(0.97);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sbox{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 10px;text-align:center;}
.hpbg{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.hpfill{height:100%;border-radius:3px;transition:width 0.6s;}
.bp{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Orbitron',monospace;font-weight:900;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
.bp:active{transform:scale(0.97);}
.bs{padding:9px 14px;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.bs:active{transform:scale(0.95);}
.stitle{font-size:9px;color:var(--muted);letter-spacing:4px;margin-bottom:12px;font-family:'Orbitron',monospace;}
.gtitle{font-size:24px;font-weight:900;letter-spacing:5px;font-family:'Orbitron',monospace;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:6px;}
.mcard{border-radius:16px;padding:16px 12px;position:relative;overflow:hidden;margin-bottom:12px;}
.mcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent 60%);pointer-events:none;}
.hex{border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.2s;border:1px solid transparent;}
.hex:active{transform:scale(0.9);}
.pring{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.pring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(#ff6b00 0% 65%,#1a1a1a 65% 100%);animation:ringRot 3s linear infinite;}
.pring::after{content:'';position:absolute;inset:-1px;border-radius:50%;background:#080808;}
.pring span{position:relative;z-index:1;}
.xpbar{height:8px;background:#111;border-radius:4px;overflow:hidden;margin:6px 0;}
.xpfill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ff6b00,#ffcc00);position:relative;overflow:hidden;}
.xpfill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:xpShim 1.5s infinite;}
.tc{animation:tcAnim 0.3s ease;}
.gbtn{font-family:'Orbitron',monospace;font-weight:900;font-size:12px;letter-spacing:3px;border:none;border-radius:14px;padding:15px 36px;cursor:pointer;transition:all 0.2s;width:100%;max-width:280px;margin-bottom:10px;}
.gbtn:active{transform:scale(0.96);}
.gbtn-p{background:linear-gradient(135deg,#ff6b00,#cc4400);color:#fff;box-shadow:0 0 25px #ff6b0044;}
.gbtn-s{background:transparent;border:1px solid #222;color:#444;}
.srow{display:flex;justify-content:space-between;width:100%;max-width:280px;background:#080808;border:1px solid #151515;border-radius:12px;padding:12px 16px;margin-bottom:8px;}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:6px;}

@keyframes ntfIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes tcAnim{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.97)}}
@keyframes ringRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes xpShim{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes trophyPop{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes skullWobble{0%,100%{transform:rotate(0)}30%{transform:rotate(-10deg)}70%{transform:rotate(10deg)}}
@keyframes hexPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes explodeOut{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes achSlide{from{transform:translateX(-50%) translateY(100px)}to{transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#ff6b0055;border-radius:2px;}
</style>
</head>

      <!-- DIFFICULTY SELECT -->
      <div style="width:100%;max-width:280px;margin-bottom:16px;">
        <div style="font-size:9px;color:#333;letter-spacing:3px;text-align:center;margin-bottom:8px;font-family:'Orbitron',monospace;">СЛОЖНОСТЬ</div>
        <div style="display:flex;gap:6px;">
          <button class="dbtn" id="diff-easy" onclick="setDiff('easy')" style="border-color:#00ff8866;color:#00ff88;">🟢 EASY</button>
          <button class="dbtn selected" id="diff-normal" onclick="setDiff('normal')" style="border-color:#ffcc00;color:#000;background:#ffcc00;">⚡ NORMAL</button>
          <button class="dbtn" id="diff-hard" onclick="setDiff('hard')" style="border-color:#ff444466;color:#ff4444;">💀 HARD</button>

let audioCtx = null;
function getAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15,decay=0.1){
  const ctx=getAudio();if(!ctx)return;
  try{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}

let unlockedAch = JSON.parse(localStorage.getItem('mdc_ach')||'[]');

function checkAch(score,mdc,dist,noHitDist,diff){
  ACH_DEFS.forEach(a=>{
    if(!unlockedAch.includes(a.id)&&a.check(score,mdc,dist,noHitDist,diff)){
      unlockedAch.push(a.id);
      localStorage.setItem('mdc_ach',JSON.stringify(unlockedAch));

  });
}

  document.getElementById('ach-desc').textContent=a.d;

}

function wmExplore(worldId){
  const w=WORLDS.find(x=>x.id===worldId);

  WM.currentWorld=worldId;
  WM.energy=Math.max(0,WM.energy-10);
  WM.steps++;
  const pool=EVENTS.filter(e=>e.type!=="danger"||(w.danger>=3));
  const evt=pool[Math.floor(Math.random()*pool.length)];
  WM.pendingEvent=evt;
  if(evt.mdc>0){bal.MDC=(bal.MDC||0)+evt.mdc;PS.mdcEarned+=evt.mdc;}

  {key:"BONK", emoji:"💥", img:IMG_BONK, dmg:30, spd:1.6, size:28, label:"BONK",  color:"#f7931a",
   url:"https://s2.coinmarketcap.com/static/img/coins/64x64/23095.png"},
  {key:"FLOKI",emoji:"⚡", img:IMG_FLOKI, dmg:35, spd:0.9, size:32, label:"FLOKI", color:"#ff5e5e",
   url:"https://s2.coinmarketcap.com/static/img/coins/64x64/10804.png"},
];
const DIFF_CFG={
  easy:  {spd:2.2,dmgMult:0.6,coinFreq:28,enemyFreq:100,label:"🟢 EASY",  bg:"#00ff8833",color:"#00ff88"},
  normal:{spd:3.0,dmgMult:1.0,coinFreq:38,enemyFreq:75, label:"⚡ NORMAL",bg:"#ffcc0033",color:"#ffcc00"},
  hard:  {spd:4.0,dmgMult:1.6,coinFreq:50,enemyFreq:55, label:"💀 HARD",  bg:"#ff444433",color:"#ff4444"},
};
let gDiff='normal';
function setDiff(d){
  gDiff=d;
  ['easy','normal','hard'].forEach(k=>{
    const b=document.getElementById('diff-'+k);
    if(!b)return;
    const cfg=DIFF_CFG[k];
    if(k===d){b.classList.add('selected');b.style.background=cfg.color;b.style.color='#000';b.style.borderColor=cfg.color;}
    else{b.classList.remove('selected');b.style.background='transparent';b.style.color=cfg.color;b.style.borderColor=cfg.color+'66';}
  });
}

const MARCEL_IMG=new Image();MARCEL_IMG.src=MARCEL_URL;
const EIMGS={};
ENEMY_DEFS.forEach(e=>{const img=new Image();img.crossOrigin="anonymous";img.src=e.url;EIMGS[e.key]=img;});

let gState="idle",gScore=0,gMdc=0,gDist=0,gBest=0,gTotalMdc=0;
let gHp=100,gLives=3,gCombo=0,gComboT=0,gNoHitDist=0;
let gShield=false,gShieldT=0,gBoost=false,gBoostT=0,gMagnet=false,gMagnetT=0;
let gFc=0,gSpd=3,gDiffMult=1,gLastTs=0,gHoldTimer=null;
let gM={x:0,y:0,vy:0,sz:34};
let gBgStars=[],gNebulas=[],gParticles=[],gCoins=[],gEnemies=[],gPowerups=[],gExplosions=[],gFloats=[];
let gScreenShake=0,gScreenShakeX=0,gScreenShakeY=0;

const GC=document.getElementById("gc");
const gCtx=GC.getContext("2d");

function resizeGame(){GC.width=window.innerWidth;GC.height=window.innerHeight;}
resizeGame();window.addEventListener("resize",()=>{if(gState!=="idle")resizeGame();});

function openGame(){
  document.getElementById("game-overlay").style.display="flex";
  resizeGame();hideGScreens();
  document.getElementById("gs-start").style.display="flex";
  const lb=getLB();
  document.getElementById("start-best").textContent=lb.length?lb[0].score:0;
  gState="start";
}
function closeGame(){dpadShow(false);
  gState="idle";
  document.getElementById("game-overlay").style.display="none";
  render();
}
function hideGScreens(){
  ["gs-start","gs-over","gs-pause","gs-leaderboard"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.style.display="none";
  });
}

function gStart(){
  hideGScreens();
  document.getElementById("game-hud").style.display="flex";
  document.getElementById("g-hp-wrap").style.display="block";
  document.getElementById("g-lives").style.display="flex";

  const cfg=DIFF_CFG[gDiff];
  gScore=0;gMdc=0;gDist=0;gHp=100;gLives=3;gCombo=0;gNoHitDist=0;
  gSpd=cfg.spd;gDiffMult=cfg.dmgMult;gFc=0;
  gShield=false;gBoost=false;gMagnet=false;gScreenShake=0;
  gParticles=[];gCoins=[];gEnemies=[];gPowerups=[];gExplosions=[];gFloats=[];
  gM.x=GC.width*0.2;gM.y=GC.height*0.5;gM.vy=0;gM.vx=0;
  JOY.baseX=GC.width*0.18;JOY.baseY=GC.height*0.82;
  JOY.stickX=JOY.baseX;JOY.stickY=JOY.baseY;

  // Stars + nebulas
  gBgStars=Array.from({length:140},()=>({x:Math.random()*GC.width,y:Math.random()*GC.height,r:Math.random()*1.6+0.2,s:Math.random()*1.8+0.3,a:Math.random()*0.7+0.2,tw:Math.random()*Math.PI*2}));
  gNebulas=Array.from({length:4},()=>({x:Math.random()*GC.width,y:Math.random()*GC.height,r:80+Math.random()*120,a:0.03+Math.random()*0.04,color:['#4400ff','#ff0044','#00ffaa','#ff6600'][Math.floor(Math.random()*4)]}));

  // Diff badge
  const badge=document.getElementById('g-diff-badge');
  badge.textContent=cfg.label;badge.style.background=cfg.bg;badge.style.color=cfg.color;badge.style.border=`1px solid ${cfg.color}44`;

  gUpdateHUD();gState="playing";gLastTs=performance.now();requestAnimationFrame(gLoop);dpadShow(true);
}

function gPause(){if(gState!=="playing")return;gState="pause";dpadShow(false);document.getElementById("gs-pause").style.display="flex";}
function gResume(){dpadShow(true);document.getElementById("gs-pause").style.display="none";gState="playing";gLastTs=performance.now();requestAnimationFrame(gLoop);dpadShow(true);}

function gOver(){
  gState="gameover";dpadShow(false);SFX.death();
  gTotalMdc+=gMdc;
  const lb=getLB();
  const prevBest=lb.length?lb[0].score:0;
  const isNewRecord=gScore>prevBest;
  saveLB(gScore,gMdc,gDist);
  if(gScore>gBest)gBest=gScore;

  document.getElementById("go-sc").textContent=gScore;
  document.getElementById("go-best").textContent=Math.max(gScore,prevBest);
  document.getElementById("go-mdc").textContent=gMdc+" 🪐";
  document.getElementById("go-dist").textContent=Math.floor(gDist)+" ly";
  document.getElementById("go-newrecord").style.display=isNewRecord?"block":"none";
  if(isNewRecord)SFX.newRecord();

  setTimeout(()=>{hideGScreens();document.getElementById("gs-over").style.display="flex";},800);
}

function gUpdateHUD(){
  document.getElementById("gsv").textContent=gScore;
  document.getElementById("gmv").textContent=gMdc;
  const hc=gHp>60?"linear-gradient(90deg,#00ff88,#44ee44)":gHp>30?"linear-gradient(90deg,#ffcc00,#ff8844)":"linear-gradient(90deg,#ff4444,#ff2222)";
  document.getElementById("g-hp-fill").style.width=gHp+"%";
  document.getElementById("g-hp-fill").style.background=hc;
  document.getElementById("g-lives").innerHTML=Array.from({length:gLives},()=>`<span style="font-size:16px;">❤️</span>`).join("");
  document.getElementById("g-dist").textContent=Math.floor(gDist)+" LIGHT YEARS";
}

function gTakeDmg(d){
  if(gShield)return;
  gHp=Math.max(0,gHp-(d*gDiffMult));
  gScreenShake=10;SFX.hit();
  gNoHitDist=0; // reset no-hit tracker
  if(gHp<=0){
    gLives--;
    if(gLives<=0){gOver();return;}
    gHp=100;gShield=true;gShieldT=200;
  }
}

function gApplyPU(t,x,y){
  const col={shield:"#4488ff",boost:"#ffcc00",life:"#ff88ff",heal:"#00ff88",magnet:"#ff6b00"}[t];
  gAddExp(x,y,col,14);SFX.powerup();
  if(t==="shield"){gShield=true;gShieldT=300;gPUMsg("🛡 SHIELD","#4488ff");}
  else if(t==="boost"){gBoost=true;gBoostT=220;gScore+=50;gPUMsg("⚡ BOOST +50","#ffcc00");}
  else if(t==="life"){gLives=Math.min(5,gLives+1);gAddFloat(x,y,"❤ +LIFE","#ff88ff");}
  else if(t==="heal"){gHp=Math.min(100,gHp+35);gAddFloat(x,y,"+35HP","#00ff88");}
  else if(t==="magnet"){gMagnet=true;gMagnetT=280;gAddFloat(x,y,"🧲 MAGNET","#ff6b00");}
}
function gPUMsg(txt,color){
  const el=document.getElementById("g-pu");
  el.textContent=txt;el.style.display="block";el.style.color=color;el.style.borderColor=color+"44";
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display="none",2000);
}
function gAddExp(x,y,color,n=10){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;gExplosions.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,alpha:1,color});}}
function gAddFloat(x,y,txt,color="#ffcc00"){gFloats.push({x,y,txt,color,a:1,vy:-1.8});}
function gAddTrail(){gParticles.push({x:gM.x-gM.sz*0.4,y:gM.y,r:3+Math.random()*3,a:0.6,vx:-(1+Math.random()*2),vy:(Math.random()-0.5)*1.5,color:gBoost?"#ffcc00":"#ff6b00"});}
function gD2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function gDrawCircleImg(img,x,y,r){
  gCtx.save();gCtx.beginPath();gCtx.arc(x,y,r,0,Math.PI*2);gCtx.clip();
  if(img&&img.complete&&img.naturalWidth>0)gCtx.drawImage(img,x-r,y-r,r*2,r*2);
  else{gCtx.fillStyle="#333";gCtx.fill();}
  gCtx.restore();
}

// Enemy death explosion (bigger, colored)
function gKillEnemy(e){
  SFX.enemyDie();
  // Big ring explosion
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2,s=3+Math.random()*6;
    gExplosions.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*5,alpha:1,color:e.color});
  }
  gAddFloat(e.x,e.y,"💥 +"+Math.floor(50*gDiffMult),"#ff4488");
  gScore+=Math.floor(50*gDiffMult);
  gCombo++;gComboT=90;
  e.x=-999;
}

function gLoop(ts){
  if(gState!=="playing")return;
  const dt=Math.min((ts-gLastTs)/16,3);gLastTs=ts;gFc++;
  const cfg=DIFF_CFG[gDiff];
  const curSpd=gBoost?gSpd*2.2:gSpd;

  // Screen shake
  if(gScreenShake>0){
    gScreenShakeX=(Math.random()-0.5)*gScreenShake;
    gScreenShakeY=(Math.random()-0.5)*gScreenShake;
    gScreenShake=Math.max(0,gScreenShake-1.2);
  } else {gScreenShakeX=0;gScreenShakeY=0;}

  gCtx.save();
  gCtx.translate(gScreenShakeX,gScreenShakeY);

  // BG gradient
  const bg=gCtx.createLinearGradient(0,0,GC.width,GC.height);
  bg.addColorStop(0,"#020008");bg.addColorStop(0.5,"#050118");bg.addColorStop(1,"#080520");
  gCtx.fillStyle=bg;gCtx.fillRect(0,0,GC.width,GC.height);

  // Nebulas
  gNebulas.forEach(n=>{
    const gr=gCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    gr.addColorStop(0,n.color+Math.floor(n.a*255).toString(16).padStart(2,"0"));
    gr.addColorStop(1,"transparent");
    gCtx.fillStyle=gr;gCtx.beginPath();gCtx.arc(n.x,n.y,n.r,0,Math.PI*2);gCtx.fill();
    n.x-=curSpd*0.08*dt;if(n.x<-n.r){n.x=GC.width+n.r;n.y=Math.random()*GC.height;}
  });

  // Stars (parallax)
  gBgStars.forEach(s=>{
    s.tw+=0.02;const twinkle=s.a*(0.8+0.2*Math.sin(s.tw));
    gCtx.beginPath();gCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    gCtx.fillStyle=`rgba(255,255,255,${twinkle})`;gCtx.fill();
    s.x-=s.s*(gBoost?2.5:1)*dt;
    if(s.x<0){s.x=GC.width;s.y=Math.random()*GC.height;}
  });

  gDist+=curSpd*dt*0.012;
  gNoHitDist+=curSpd*dt*0.012;
  if(gFc%500===0){gSpd=Math.min(gSpd+0.3,10);}

  // Spawn
  const cFreq=Math.max(18,cfg.coinFreq-gFc*0.008|0);
  const eFreq=Math.max(40,cfg.enemyFreq-gFc*0.015|0);
  if(gFc%cFreq===0)gSpawnCoin();
  if(gFc%eFreq===0)gSpawnEnemy();
  if(gFc%260===0)gSpawnPU();
  if(gFc%3===0)gAddTrail();

  // Physics
  // Apply velocity to position
  gM.vx=(gM.vx||0)*0.82; gM.x+=gM.vx*dt;
  gM.vy+=(gBoost?0.18:0.4)*dt; gM.y+=gM.vy*dt;
  // X bounds
  const leftBound=GC.width*0.06, rightBound=GC.width*0.65;
  if(gM.x<leftBound){gM.x=leftBound; gM.vx=0;}
  if(gM.x>rightBound){gM.x=rightBound; gM.vx=0;}
  const top=GC.height*0.05, bot=GC.height*0.93;
  if(gM.y<top){gM.y=top; gM.vy=Math.abs(gM.vy)*0.3;}
  if(gM.y>bot){gM.y=bot; gM.vy=-Math.abs(gM.vy)*0.4; gTakeDmg(4);}

  // Particles (engine trail)
  gParticles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.a-=0.04*dt;p.r*=0.97;});
  gParticles=gParticles.filter(p=>p.a>0);
  gParticles.forEach(p=>{
    gCtx.beginPath();gCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    gCtx.fillStyle=p.color==="#ffcc00"?`rgba(255,204,0,${p.a})`:`rgba(255,107,0,${p.a})`;
    gCtx.fill();
  });

  // Coins
  gCoins.forEach(c=>{
    c.x-=curSpd*dt;c.a+=0.06;
    if(gMagnet&&gD2(c,gM)<180){c.x+=(gM.x-c.x)*0.13;c.y+=(gM.y-c.y)*0.13;}
    const gr=gCtx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r+6);
    gr.addColorStop(0,"rgba(255,200,0,0.15)");gr.addColorStop(1,"transparent");
    gCtx.fillStyle=gr;gCtx.beginPath();gCtx.arc(c.x,c.y,c.r+6,0,Math.PI*2);gCtx.fill();
    gCtx.save();gCtx.translate(c.x,c.y);gCtx.rotate(c.a);
    gCtx.font=`${c.r*2.2}px serif`;gCtx.textAlign="center";gCtx.textBaseline="middle";gCtx.fillText("🪐",0,0);
    gCtx.restore();
    if(gD2(c,gM)<(c.r+gM.sz*0.75)){
      const v=c.t==="super"?5:c.t==="big"?3:1;
      gMdc+=v;gScore+=v*10*(gCombo>3?2:1);gCombo++;gComboT=80;
      v>1?SFX.bigCoin():SFX.coin();
      gAddExp(c.x,c.y,"#ffcc00",5);gAddFloat(c.x,c.y,`+${v}🪐`,"#ffcc00");
      if(gCombo>4)gAddFloat(c.x,c.y-28,`${gCombo}x COMBO!`,"#ff4488");
      c.x=-999;
      checkAch(gScore,gMdc,gDist,gNoHitDist,gDiff);
    }
  });
  gCoins=gCoins.filter(c=>c.x>-50);

  // Enemies
  gEnemies.forEach(e=>{
    e.x-=(curSpd+e.spd)*dt;
    e.y=e.baseY+Math.sin(gFc*0.035+e.wPhase)*e.wAmp;
    // Glow
    gCtx.beginPath();gCtx.arc(e.x,e.y,e.size+8,0,Math.PI*2);
    gCtx.fillStyle=e.color+"18";gCtx.fill();
    const img=EIMGS[e.key];
    if(img&&img.complete&&img.naturalWidth>0){
      gDrawCircleImg(img,e.x,e.y,e.size);
    } else {
      // emoji fallback
      gCtx.beginPath();gCtx.arc(e.x,e.y,e.size,0,Math.PI*2);
      gCtx.fillStyle=e.color+"33";gCtx.fill();
      gCtx.font=`${e.size*1.4}px serif`;gCtx.textAlign="center";gCtx.textBaseline="middle";
      gCtx.fillText(e.emoji,e.x,e.y);
    }
    gCtx.beginPath();gCtx.arc(e.x,e.y,e.size,0,Math.PI*2);
    gCtx.strokeStyle=e.color+"88";gCtx.lineWidth=2;gCtx.stroke();
    gCtx.font="bold 8px 'Orbitron',monospace";gCtx.fillStyle=e.color+"cc";
    gCtx.textAlign="center";gCtx.fillText(e.label,e.x,e.y+e.size+10);

    if(gD2(e,gM)<(e.size+gM.sz*0.6)){
      if(gShield){
        gShield=false;gShieldT=0;SFX.shield();
        gKillEnemy(e);
        gAddFloat(e.x,e.y,"🛡 REFLECT!","#4488ff");
      } else {
        gTakeDmg(e.dmg);
        gAddExp(e.x,e.y,"#ff4444",8);gAddFloat(e.x,e.y,`-${e.dmg}HP`,"#ff4444");
        gScreenShake=14;e.x=-999;
      }
    }
  });
  gEnemies=gEnemies.filter(e=>e.x>-80);

  // Powerups
  gPowerups.forEach(p=>{
    p.x-=curSpd*dt;p.a+=0.04;
    gCtx.beginPath();gCtx.arc(p.x,p.y,p.r+6,0,Math.PI*2);
    gCtx.fillStyle=p.c+"22";gCtx.fill();
    gCtx.save();gCtx.translate(p.x,p.y);gCtx.rotate(Math.sin(p.a)*0.25);
    gCtx.font="26px serif";gCtx.textAlign="center";gCtx.textBaseline="middle";gCtx.fillText(p.e,0,0);
    gCtx.restore();
    if(gD2(p,gM)<(p.r+gM.sz*0.8)){gApplyPU(p.t,p.x,p.y);p.x=-999;}
  });
  gPowerups=gPowerups.filter(p=>p.x>-50);

  // Explosions
  gExplosions.forEach(e=>{e.x+=e.vx*dt;e.y+=e.vy*dt;e.alpha-=0.03*dt;e.vx*=0.94;e.vy*=0.94;});
  gExplosions=gExplosions.filter(e=>e.alpha>0);
  gExplosions.forEach(e=>{
    gCtx.beginPath();gCtx.arc(e.x,e.y,e.r,0,Math.PI*2);
    gCtx.fillStyle=e.color+Math.floor(e.alpha*255).toString(16).padStart(2,"0");
    gCtx.fill();
  });

  // Floats
  gFloats.forEach(f=>{f.y+=f.vy*dt;f.a-=0.018*dt;});
  gFloats=gFloats.filter(f=>f.a>0);
  gFloats.forEach(f=>{
    gCtx.font="bold 13px 'Orbitron',monospace";gCtx.textAlign="center";
    gCtx.fillStyle=f.color+Math.floor(f.a*255).toString(16).padStart(2,"0");
    gCtx.fillText(f.txt,f.x,f.y);
  });

  // Timers
  if(gComboT>0){gComboT-=dt;if(gComboT<=0)gCombo=0;}
  if(gShieldT>0){gShieldT-=dt;if(gShieldT<=0){gShield=false;}}
  if(gBoostT>0){gBoostT-=dt;if(gBoostT<=0){gBoost=false;}}
  if(gMagnetT>0){gMagnetT-=dt;if(gMagnetT<=0)gMagnet=false;}

  joyApply(dt);

  // Draw Marcel
  gCtx.save();gCtx.translate(gM.x,gM.y);
  const tilt=Math.max(-0.4,Math.min(0.4,gM.vy*0.04));gCtx.rotate(tilt);
  if(gShield){
    gCtx.beginPath();gCtx.arc(0,0,gM.sz+12,0,Math.PI*2);
    gCtx.fillStyle=`rgba(68,136,255,${0.1+Math.sin(gFc*0.15)*0.07})`;gCtx.fill();
    gCtx.strokeStyle=`rgba(68,136,255,0.5)`;gCtx.lineWidth=2;gCtx.stroke();
  }
  if(gBoost){
    const bg2=gCtx.createRadialGradient(-25,0,0,-25,0,36);
    bg2.addColorStop(0,"rgba(255,204,0,0.45)");bg2.addColorStop(1,"transparent");
    gCtx.fillStyle=bg2;gCtx.beginPath();gCtx.ellipse(-25,0,40,14,0,0,Math.PI*2);gCtx.fill();
  }
  gCtx.beginPath();gCtx.arc(0,0,gM.sz,0,Math.PI*2);gCtx.clip();
  if(MARCEL_IMG.complete&&MARCEL_IMG.naturalWidth>0)gCtx.drawImage(MARCEL_IMG,-gM.sz,-gM.sz,gM.sz*2,gM.sz*2);
  else{gCtx.fillStyle="#111";gCtx.fill();gCtx.font=`${gM.sz*1.6}px serif`;gCtx.textAlign="center";gCtx.textBaseline="middle";gCtx.fillText("🐶",0,0);}
  gCtx.restore();
  gCtx.beginPath();gCtx.arc(gM.x,gM.y,gM.sz,0,Math.PI*2);
  gCtx.strokeStyle=gShield?"rgba(68,136,255,0.7)":"rgba(255,107,0,0.45)";gCtx.lineWidth=2;gCtx.stroke();

  // Combo display
  if(gCombo>2){
    const comboAlpha=Math.min(1,gComboT/20);
    gCtx.font=`bold ${Math.min(16+gCombo,26)}px 'Orbitron',monospace`;
    gCtx.fillStyle=`rgba(255,68,136,${comboAlpha*0.9})`;
    gCtx.textAlign="center";gCtx.fillText(`${gCombo}x COMBO!`,GC.width/2,GC.height*0.14);
  }

  joyDrawOnCanvas();

  gCtx.restore(); // end screen shake

  // Score increment
  gScore+=Math.floor(curSpd*dt*0.35);

  // Periodic achievement check
  if(gFc%60===0)checkAch(gScore,gMdc,gDist,gNoHitDist,gDiff);

  gUpdateHUD();
  requestAnimationFrame(gLoop);
}

function gSpawnCoin(){
  const y=GC.height*0.1+Math.random()*GC.height*0.78;
  const t=Math.random()<0.08?"big":Math.random()<0.03?"super":"norm";
  gCoins.push({x:GC.width+20,y,r:t==="super"?18:t==="big"?14:10,t,a:0});
}
const _EIMGS={};
ENEMY_DEFS.forEach(e=>{if(e.img){const i=new Image();i.src=e.img;_EIMGS[e.key]=i;}});

function gSpawnEnemy(){
  const d=ENEMY_DEFS[Math.floor(Math.random()*ENEMY_DEFS.length)];
  const y=GC.height*0.1+Math.random()*GC.height*0.8;
  const speedBoost=1+(gFc*0.0002);
  gEnemies.push({x:GC.width+40,y,baseY:y,wAmp:25+Math.random()*55,wPhase:Math.random()*Math.PI*2,...d,spd:d.spd*speedBoost,imgEl:_EIMGS[d.key]||null});
}
function gSpawnPU(){
  const types=[{e:"🛡",t:"shield",c:"#4488ff"},{e:"⚡",t:"boost",c:"#ffcc00"},{e:"⭐",t:"life",c:"#ff88ff"},{e:"💊",t:"heal",c:"#00ff88"},{e:"🧲",t:"magnet",c:"#ff6b00"}];
  const p=types[Math.floor(Math.random()*types.length)];
  gPowerups.push({x:GC.width+20,y:GC.height*0.15+Math.random()*GC.height*0.7,...p,r:18,a:0});
}

function gJump(){
  if(gState!=="playing")return;
  gM.vy=-8.5;SFX.jump();
  gAddExp(gM.x+10,gM.y+8,"#ff6b00",3);
}

// ═══ JOYSTICK (drawn on canvas) ═══
const JOY={
  active:false, id:-1,
  baseX:0, baseY:0,
  stickX:0, stickY:0,
  dx:0, dy:0,
  R:70, dead:10,
  visible:false
};

function dpadShow(show){ JOY.visible=show; if(!show)joyReset(); }
function joyShow(show){ dpadShow(show); }

function joyReset(){
  JOY.active=false; JOY.dx=0; JOY.dy=0; JOY.visible=true;
  // reset stick to base
  JOY.stickX=JOY.baseX; JOY.stickY=JOY.baseY;
}

function joyDraw(){
  if(!JOY.visible||gState!=="playing")return;
  const ctx=gCtx;
  const bx=JOY.baseX, by=JOY.baseY, R=JOY.R;
  // outer ring
  ctx.beginPath(); ctx.arc(bx,by,R,0,Math.PI*2);
  ctx.fillStyle="rgba(255,107,0,0.08)";
  ctx.fill();
  ctx.strokeStyle="rgba(255,107,0,0.5)";
  ctx.lineWidth=2.5; ctx.stroke();
  // inner stick
  ctx.beginPath(); ctx.arc(JOY.stickX,JOY.stickY,28,0,Math.PI*2);
  const g=ctx.createRadialGradient(JOY.stickX-8,JOY.stickY-8,2,JOY.stickX,JOY.stickY,28);
  g.addColorStop(0,"rgba(255,160,60,0.9)");
  g.addColorStop(1,"rgba(255,107,0,0.6)");
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle="rgba(255,200,80,0.7)";
  ctx.lineWidth=2; ctx.stroke();
}

function joyTouchStart(e){
  if(gState!=="playing")return false;
  const bx=GC.getBoundingClientRect();
  const scaleX=GC.width/bx.width, scaleY=GC.height/bx.height;
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const cx=(t.clientX-bx.left)*scaleX;
    const cy=(t.clientY-bx.top)*scaleY;
    // left 50% bottom 45% of canvas
    if(cx<GC.width*0.5 && cy>GC.height*0.55){
      JOY.active=true; JOY.id=t.identifier;
      JOY.baseX=cx; JOY.baseY=cy;
      JOY.stickX=cx; JOY.stickY=cy;
      JOY.dx=0; JOY.dy=0;
      return true;
    }
  }
  return false;
}

function joyTouchMove(e){
  if(!JOY.active)return;
  const bx=GC.getBoundingClientRect();
  const scaleX=GC.width/bx.width, scaleY=GC.height/bx.height;
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.identifier!==JOY.id)continue;
    const cx=(t.clientX-bx.left)*scaleX;
    const cy=(t.clientY-bx.top)*scaleY;
    const ddx=cx-JOY.baseX, ddy=cy-JOY.baseY;
    const dist=Math.hypot(ddx,ddy);
    const clamped=Math.min(dist,JOY.R);
    const angle=Math.atan2(ddy,ddx);
    JOY.stickX=JOY.baseX+Math.cos(angle)*clamped;
    JOY.stickY=JOY.baseY+Math.sin(angle)*clamped;
    JOY.dx=dist>JOY.dead ? Math.cos(angle)*(clamped/JOY.R) : 0;
    JOY.dy=dist>JOY.dead ? Math.sin(angle)*(clamped/JOY.R) : 0;
  }
}

function joyTouchEnd(e){
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===JOY.id){ joyReset(); break; }
  }
}

function joyApply(dt){
  if(!JOY.active||gState!=="playing")return;
  const spd=12;
  if(Math.abs(JOY.dx)>0.05) gM.vx=JOY.dx*spd;
  if(Math.abs(JOY.dy)>0.05) gM.vy=JOY.dy*spd;
}


// ═══ INPUT LISTENERS ═══
GC.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(gState==="start"){gStart();return;}
  if(gState==="pause"){gResume();return;}
  if(gState==="playing"){
    const grabbed=joyTouchStart(e);
    if(!grabbed){
      gJump();
      gHoldTimer=setTimeout(()=>{if(gState==="playing")gPause();},900);
    }
  }
},{passive:false});
GC.addEventListener("touchmove",e=>{e.preventDefault();joyTouchMove(e);},{passive:false});
GC.addEventListener("touchend",e=>{clearTimeout(gHoldTimer);joyTouchEnd(e);},{passive:false});
GC.addEventListener("click",()=>{if(gState==="playing")gJump();});
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();if(gState==="playing")gJump();else if(gState==="start")gStart();}
  if(e.code==="ArrowUp"){e.preventDefault();if(gState==="playing")gM.vy=-10;}
  if(e.code==="ArrowDown"){e.preventDefault();if(gState==="playing")gM.vy=8;}
  if(e.code==="ArrowLeft"){e.preventDefault();if(gState==="playing")gM.vx=-12;}
  if(e.code==="ArrowRight"){e.preventDefault();if(gState==="playing")gM.vx=12;}
  if(e.code==="Escape"){if(gState==="playing")gPause();else if(gState==="pause")gResume();}
});

// Telegram back button support
if(tg?.BackButton){
  tg.BackButton.onClick(()=>{
    if(gState==="playing")gPause();
    else if(gState==="pause"||gState==="gameover"||gState==="start"){closeGame();}
    else{tg.BackButton.hide();}
  });
}

// Init
window.addEventListener('DOMContentLoaded',()=>{
  if(TG_NAME)PS.name=TG_NAME;
  render();
});
</script>
