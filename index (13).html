<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MDC GAME 🪐</title>
<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--mdc:#ff6b00;--geo:#00d4aa;--rcwt:#cc44ff;--rcwe:#ff44cc;--bg:#030303;--bg2:#0a0a0a;--line:#1e1e1e;--muted:#555;--safe-b:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Share Tech Mono',monospace;}
body{display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px);}
#hdr{flex-shrink:0;height:62px;background:linear-gradient(180deg,#0a0a0a,#050505);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;z-index:10;}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ff6b0055,transparent);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 16px;position:relative;z-index:2;}
#bnav{flex-shrink:0;background:#050505;border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe-b);height:calc(62px + var(--safe-b));position:relative;z-index:10;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;border-top:2px solid transparent;cursor:pointer;}
.ni{font-size:22px;line-height:1;transition:transform 0.2s;}
.nb.active .ni{transform:scale(1.15);}
.nl{font-size:9px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:1px;}

/* GAME OVERLAY */
#game-overlay{position:fixed;inset:0;z-index:100;display:none;background:#000;flex-direction:column;}
#game-canvas-wrap{flex:1;position:relative;overflow:hidden;}
#gc{display:block;width:100%;height:100%;}
#game-hud{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;pointer-events:none;}
.ghbox{background:rgba(0,0,0,0.7);border-radius:12px;padding:8px 14px;backdrop-filter:blur(8px);}
#g-hp-wrap{position:absolute;top:76px;left:16px;right:16px;pointer-events:none;}
#g-hp-bg{height:7px;background:#111;border-radius:4px;overflow:hidden;border:1px solid #222;}
#g-hp-fill{height:100%;border-radius:4px;transition:width 0.3s;}
#g-lives{position:absolute;top:96px;right:16px;pointer-events:none;display:flex;gap:4px;}
#g-dist{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:2px;pointer-events:none;font-family:'Orbitron',monospace;}
#g-pu{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border-radius:10px;padding:6px 16px;font-size:11px;letter-spacing:2px;border:1px solid #333;display:none;font-family:'Orbitron',monospace;white-space:nowrap;}
#g-diff-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:8px;font-family:'Orbitron',monospace;letter-spacing:2px;padding:3px 10px;border-radius:8px;pointer-events:none;}

/* ACHIEVEMENT POPUP */
#ach-popup{position:fixed;top:90px;left:50%;transform:translateX(-50%) translateY(-150px);z-index:999;background:linear-gradient(135deg,#0f1a0f,#080808);border:1px solid #00ff8855;border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:10px;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:260px;box-shadow:0 0 20px #00ff8822;}
#ach-popup.show{transform:translateX(-50%) translateY(0);}

/* GAME SCREENS */
.gscreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
#gs-start{background:radial-gradient(ellipse at 50% 40%,#080220,#000 70%);}
#gs-over{background:radial-gradient(ellipse at center,#1a0505,#000 70%);display:none;}
#gs-pause{background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);display:none;}
#gs-leaderboard{background:radial-gradient(ellipse at center,#05101a,#000 70%);display:none;}

/* DIFFICULTY BUTTONS */
.dbtn{flex:1;padding:10px 6px;border-radius:12px;border:1px solid;font-family:'Orbitron',monospace;font-weight:900;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;background:transparent;text-align:center;}
.dbtn:active{transform:scale(0.95);}
.dbtn.selected{color:#000;}

/* SHARED UI */
#notif{position:fixed;top:72px;left:14px;right:14px;z-index:999;background:#0d0d0d;border-radius:12px;padding:12px 18px;font-size:13px;text-align:center;display:none;animation:ntfIn 0.3s ease;}
#modal{position:fixed;inset:0;z-index:990;background:#000000cc;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
#mbox{background:linear-gradient(180deg,#0f0f0f,#080808);border:1px solid #1e1e1e;border-radius:24px 24px 0 0;padding:24px 18px 44px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1);}
#mbox::before{content:'';display:block;width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;transition:transform 0.15s;}
.card:active{transform:scale(0.97);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sbox{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 10px;text-align:center;}
.hpbg{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.hpfill{height:100%;border-radius:3px;transition:width 0.6s;}
.bp{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Orbitron',monospace;font-weight:900;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
.bp:active{transform:scale(0.97);}
.bs{padding:9px 14px;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.bs:active{transform:scale(0.95);}
.stitle{font-size:9px;color:var(--muted);letter-spacing:4px;margin-bottom:12px;font-family:'Orbitron',monospace;}
.gtitle{font-size:24px;font-weight:900;letter-spacing:5px;font-family:'Orbitron',monospace;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:6px;}
.mcard{border-radius:16px;padding:16px 12px;position:relative;overflow:hidden;margin-bottom:12px;}
.mcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent 60%);pointer-events:none;}
.hex{border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.2s;border:1px solid transparent;}
.hex:active{transform:scale(0.9);}
.pring{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.pring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(#ff6b00 0% 65%,#1a1a1a 65% 100%);animation:ringRot 3s linear infinite;}
.pring::after{content:'';position:absolute;inset:-1px;border-radius:50%;background:#080808;}
.pring span{position:relative;z-index:1;}
.xpbar{height:8px;background:#111;border-radius:4px;overflow:hidden;margin:6px 0;}
.xpfill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ff6b00,#ffcc00);position:relative;overflow:hidden;}
.xpfill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:xpShim 1.5s infinite;}
.tc{animation:tcAnim 0.3s ease;}
.gbtn{font-family:'Orbitron',monospace;font-weight:900;font-size:12px;letter-spacing:3px;border:none;border-radius:14px;padding:15px 36px;cursor:pointer;transition:all 0.2s;width:100%;max-width:280px;margin-bottom:10px;}
.gbtn:active{transform:scale(0.96);}
.gbtn-p{background:linear-gradient(135deg,#ff6b00,#cc4400);color:#fff;box-shadow:0 0 25px #ff6b0044;}
.gbtn-s{background:transparent;border:1px solid #222;color:#444;}
.srow{display:flex;justify-content:space-between;width:100%;max-width:280px;background:#080808;border:1px solid #151515;border-radius:12px;padding:12px 16px;margin-bottom:8px;}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:6px;}

@keyframes ntfIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes tcAnim{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.97)}}
@keyframes ringRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes xpShim{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes trophyPop{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes skullWobble{0%,100%{transform:rotate(0)}30%{transform:rotate(-10deg)}70%{transform:rotate(10deg)}}
@keyframes hexPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes explodeOut{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes achSlide{from{transform:translateX(-50%) translateY(100px)}to{transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#ff6b0055;border-radius:2px;}
</style>
</head>

    <button id="g-mute-btn" onclick="const m=musToggle();this.textContent=m?'🔇':'🎵';" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);border:1px solid #333;color:#fff;font-size:14px;padding:2px 8px;border-radius:8px;cursor:pointer;z-index:10;">🎵</button>

// TELEGRAM MINI APP INIT
// ═══════════════════════════════════════════
const tg = window.Telegram?.WebApp;
const IS_TG = !!tg;
if(tg){
  tg.ready();
  tg.expand();
  tg.disableVerticalSwipes?.();
  try{ tg.setHeaderColor('#030303'); }catch(e){}
  try{ tg.setBackgroundColor('#030303'); }catch(e){}
  try{ tg.enableClosingConfirmation(); }catch(e){}
  try{ tg.setBottomBarColor?.('#030303'); }catch(e){}
  // Request fullscreen if available (TG 7.7+)
  try{ tg.requestFullscreen?.(); }catch(e){}
  // Back button — pause game or go to menu
  try{
    tg.BackButton.onClick(()=>{
      if(gState==='playing') gPause();
      else if(gState==='pause') gResume();
      else if(tab!=='play'){ tab='play'; render(); }
      else tg.BackButton.hide();
    });
  }catch(e){}
}
const TG_USER = tg?.initDataUnsafe?.user || null;
const TG_NAME = TG_USER?.first_name || TG_USER?.username || null;
const TG_AVATAR = TG_USER?.photo_url || null;

// Haptic feedback helper
function haptic(type='light'){
  try{ tg?.HapticFeedback?.impactOccurred(type); }catch(e){}
}
function hapticNotify(type='success'){
  try{ tg?.HapticFeedback?.notificationOccurred(type); }catch(e){}
}

// ═══════════════════════════════════════════
// AUDIO ENGINE (Web Audio API — no files needed)
// ═══════════════════════════════════════════
let audioCtx = null;
function getAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15,decay=0.1){
  const ctx=getAudio();if(!ctx)return;
  try{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}
const SFX={
  jump:()=>{playTone(520,0.08,'sine',0.12);setTimeout(()=>playTone(700,0.06,'sine',0.1),60);},
  coin:()=>{playTone(880,0.05,'sine',0.1);setTimeout(()=>playTone(1100,0.08,'sine',0.12),40);},
  bigCoin:()=>{playTone(660,0.05,'sine',0.12);setTimeout(()=>playTone(880,0.05,'sine',0.12),50);setTimeout(()=>playTone(1100,0.1,'sine',0.15),100);},
  hit:()=>{playTone(150,0.15,'sawtooth',0.2);playTone(80,0.2,'square',0.15);},
  death:()=>{[200,160,120,80].forEach((f,i)=>setTimeout(()=>playTone(f,0.18,'sawtooth',0.18),i*80));},
  shield:()=>{playTone(440,0.1,'sine',0.15);setTimeout(()=>playTone(660,0.15,'sine',0.15),80);},
  powerup:()=>{[440,550,660,880].forEach((f,i)=>setTimeout(()=>playTone(f,0.08,'sine',0.15),i*50));},
  enemyDie:()=>{playTone(300,0.06,'square',0.12);playTone(200,0.1,'sawtooth',0.1);},
  achievement:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,'sine',0.18),i*80));},
  newRecord:()=>{[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'sine',0.2),i*70));}
};

function getLB(){return JSON.parse(localStorage.getItem('mdc_lb')||'[]');}

  const lb=getLB();
  const name=TG_NAME||'YOU';
  lb.push({name,score,mdc,dist:Math.floor(dist),date:new Date().toLocaleDateString('ru')});

    </style>`;
  },

  useSkill(skillId){
    if(this.turn !== 'player') return;
    const sk = this.SKILLS.find(s=>s.id===skillId);
    if(!sk || this.hero.mana < sk.mana) return;

    this.hero.mana -= sk.mana;
    this.anim = 'enemy-hit';
    let dmg = 0, msg = '';

    if(skillId === 'attack'){
      dmg = this.hero.atk + Math.floor(Math.random()*10) - (this.enemy.shielded?this.enemy.def*2:0);
      dmg = Math.max(1, dmg);
      this.enemy.shielded = false;
      msg = `⚔ Атака! ${dmg} урона`;
    } else if(skillId === 'plasma'){
      dmg = Math.floor(this.hero.atk * 1.6) + Math.floor(Math.random()*15);
      if(this.enemy.shielded){ dmg = Math.floor(dmg*0.5); this.enemy.shielded=false; }
      msg = `🔱 Плазма! ${dmg} урона`;
    } else if(skillId === 'shield'){
      this.hero.shielded = true;
      this.anim = 'hero-attack';
      msg = '🛡 Щит активирован!';
    } else if(skillId === 'gravity'){
      dmg = Math.floor(this.hero.atk * 2.2);
      this.enemy.shielded = false;
      msg = `🌀 Гравитон! ${dmg} урона — щит пробит!`;
    } else if(skillId === 'heal'){
      const heal = 30 + Math.floor(Math.random()*15);
      this.hero.hp = Math.min(this.hero.maxHp, this.hero.hp + heal);
      this.anim = 'hero-attack';
      msg = `💚 Исцеление +${heal} HP`;
    } else if(skillId === 'ultimate'){
      dmg = this.hero.atk * 3 + Math.floor(Math.random()*20);
      this.enemy.shielded = false;
      msg = `☄ УЛЬТРА! ${dmg} УРОНА!`;
    }

    if(dmg > 0) this.enemy.hp -= dmg;
    this.log.push(msg);

    // Regen 1 mana each turn
    this.hero.mana = Math.min(this.hero.maxMana, this.hero.mana + 1);

    this.renderBattle();
    setTimeout(()=>{ this.anim=null; this.checkEnd(); }, 350);
  },

  enemyTurn(){
    if(this.turn !== 'enemy') return;
    const e = this.enemy;
    const skId = e.skills[Math.floor(Math.random()*e.skills.length)];
    const esk = this.ENEMY_SKILLS[skId] || this.ENEMY_SKILLS.bite;
    this.anim = 'hero-hit';

    let dmg = 0, msg = '';
    if(esk.dmg === 0){
      e.shielded = true;
      this.anim = null;
      msg = `${e.emoji} ${e.name} использует ${esk.name}!`;
    } else {
      dmg = Math.floor(e.atk * esk.dmg + Math.random()*8);
      if(this.hero.shielded){ dmg = Math.max(1, Math.floor(dmg*0.3)); this.hero.shielded=false; msg=`🛡 Щит поглотил! ${dmg} урона`; }
      else msg = `${e.emoji} ${esk.name}! ${dmg} урона`;
      // Effects
      if(esk.effect==='poison'){ e.poisoned=(e.poisoned||0)+1; } // poison self? no — apply to hero
      if(esk.effect==='bleed'){ this.hero.bled=(this.hero.bled||0)+2; }
      this.hero.hp -= dmg;
    }

    // Apply DoTs
    if(this.hero.bled>0){ this.hero.hp-=this.hero.bled; msg+=` 🩸-${this.hero.bled}`; this.hero.bled=Math.max(0,this.hero.bled-1); }
    if(e.poisoned>0){ e.hp-=e.poisoned*3; msg+=` ☠-${e.poisoned*3}`; e.poisoned=Math.max(0,e.poisoned-1); }

    this.log.push(msg);
    this.turn = 'player';
    this.renderBattle();
    setTimeout(()=>{ this.anim=null; this.checkEnd(); }, 400);
  },

  checkEnd(){
    if(this.enemy.hp <= 0){
      this.turn = 'end';
      const reward = this.stake * this.enemy.reward;
      PS.wins++; PS.streak++;
      gTotalMdc += reward;
      this.log.push(`🏆 ПОБЕДА! +${reward} MDC!`);
      this.showResult(true, reward);
      return;
    }
    if(this.hero.hp <= 0){
      this.turn = 'end';
      PS.losses++; PS.streak=0;
      this.log.push(`💀 ПОРАЖЕНИЕ! -${this.stake} MDC`);
      this.showResult(false, this.stake);
      return;
    }
    if(this.turn === 'player'){
      // Switch to enemy
      this.turn = 'enemy';
      this.renderBattle();
      setTimeout(()=>this.enemyTurn(), 900);
    }
  },

  showResult(won, amount){
    this.renderBattle();
    setTimeout(()=>{
      const el=document.getElementById('content');
      if(!el)return;
      el.insertAdjacentHTML('beforeend',`
        <div style="position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:999;" onclick="BATTLE.active=false;render();">
          <div style="background:#111;border:2px solid ${won?'#ffcc00':'#ff4444'};border-radius:20px;padding:32px 24px;text-align:center;max-width:280px;">
            <div style="font-size:48px;margin-bottom:12px;">${won?'🏆':'💀'}</div>
            <div style="font-size:20px;font-weight:900;color:${won?'#ffcc00':'#ff4444'};font-family:'Orbitron',monospace;margin-bottom:8px;">${won?'ПОБЕДА!':'ПОРАЖЕНИЕ'}</div>
            <div style="font-size:14px;color:${won?'#ffcc00':'#ff4444'};margin-bottom:16px;">${won?'+'+amount+' MDC':'-'+amount+' MDC'}</div>
            <div style="font-size:11px;color:#666;">Нажми чтобы продолжить</div>
          </div>
        </div>`);
    }, 300);
  },

  flee(){
    this.active = false;
    PS.losses++;
    render();
  },
};

function drawPlanetScene(canvasId, planetId) {
  const cv = document.getElementById(canvasId);
  if (!cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  const scenes = {
    mars: {
      sky: ['#0d0200','#1a0500','#2d0a00'],
      ground: ['#8B2500','#6B1800','#3D0E00'],
      stars: '#ffaa8844',
      details: (ctx,W,H) => {
        // Two moons
        ctx.beginPath(); ctx.arc(W*0.75, H*0.18, 8, 0, Math.PI*2);
        const mg=ctx.createRadialGradient(W*0.75,H*0.18,0,W*0.75,H*0.18,8);
        mg.addColorStop(0,'#e8c89a'); mg.addColorStop(1,'#a08060');
        ctx.fillStyle=mg; ctx.fill();
        ctx.beginPath(); ctx.arc(W*0.82, H*0.12, 5, 0, Math.PI*2);
        ctx.fillStyle='#c0a080'; ctx.fill();
        // Mars dust storm glow
        const dg=ctx.createLinearGradient(0,H*0.45,0,H*0.65);
        dg.addColorStop(0,'rgba(180,60,0,0)');
        dg.addColorStop(1,'rgba(180,60,0,0.15)');
        ctx.fillStyle=dg; ctx.fillRect(0,H*0.45,W,H*0.2);
        // Mesa silhouettes

    ctx.beginPath(); ctx.arc(Math.abs(sx)%W, Math.abs(sy), sr, 0, Math.PI*2); ctx.fill();
  }

  // Planet-specific details
  if(s.details) s.details(ctx, W, H);

  // Ground terrain
  const pts = [];
  for(let x=0;x<=W;x+=3){
    const t=x*0.025;
    const y = H*0.68 + Math.sin(t)*H*0.03 + Math.sin(t*2.1+1)*H*0.015 + Math.sin(t*0.4)*H*0.02;
    pts.push({x,y});

  const groundG = ctx.createLinearGradient(0,H*0.67,0,H);
  const gc2 = s.ground;
  groundG.addColorStop(0, gc2[0]); groundG.addColorStop(0.4, gc2[1]); groundG.addColorStop(1, gc2[2]);
  ctx.fillStyle = groundG;
  ctx.beginPath(); ctx.moveTo(0,H);
  pts.forEach(p => ctx.lineTo(p.x,p.y));
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Ground edge highlight
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = gc2[0]+'cc'; ctx.lineWidth=1.5; ctx.stroke();
}

const MUS={muted:false,ctx:null,gain:null,world:null};
const WORLD_THEMES={
  mars:  {notes:[220,261,330,392,440],bpm:95},
  doge:  {notes:[247,294,370,440,494],bpm:112},
  pepe:  {notes:[220,261,311,370,415],bpm:80},
  crypto:{notes:[261,330,392,494,523],bpm:125},
  void:  {notes:[196,220,277,349,392],bpm:65},
};
let _mStep=0,_mNext=0,_mNotes=WORLD_THEMES.mars.notes,_mBpm=95;

function musCtx(){
  if(!MUS.ctx)try{MUS.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  if(MUS.ctx&&!MUS.gain){MUS.gain=MUS.ctx.createGain();MUS.gain.gain.value=0.12;MUS.gain.connect(MUS.ctx.destination);}
  return MUS.ctx;
}
function musUpdate(){
  if(MUS.muted||gState!=='playing')return;
  const ctx=musCtx();if(!ctx)return;
  if(ctx.state==='suspended')ctx.resume();
  const now=ctx.currentTime;
  if(now<_mNext)return;
  const wid=(typeof WM!=='undefined'&&WM?.currentWorld)||'mars';
  if(wid!==MUS.world){MUS.world=wid;const th=WORLD_THEMES[wid]||WORLD_THEMES.mars;_mNotes=th.notes;_mBpm=th.bpm;_mStep=0;}
  let minD=9999;gEnemies.forEach(e=>{const d=Math.abs(e.x-gM.x);if(d<minD)minD=d;});
  const sit=gHp<25?'danger':gHp<50?'tense':minD<GC.width*0.22?'tense':'normal';
  const blen=60/(_mBpm*(sit==='danger'?1.6:sit==='tense'?1.3:1.0));
  _mNext=now+blen;
  if(_mStep%2===0){const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.value=_mNotes[0]/2;g.gain.setValueAtTime(0.09,now);g.gain.exponentialRampToValueAtTime(0.001,now+blen*1.5);o.connect(g);g.connect(MUS.gain);o.start(now);o.stop(now+blen*1.5);}
  const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='square';o2.frequency.value=_mNotes[_mStep%_mNotes.length]*2;o2.detune.value=(Math.random()-0.5)*6;g2.gain.setValueAtTime(0.05,now);g2.gain.exponentialRampToValueAtTime(0.001,now+blen*0.7);o2.connect(g2);g2.connect(MUS.gain);o2.start(now);o2.stop(now+blen*0.7);
  _mStep=(_mStep+(sit==='danger'?2:1))%_mNotes.length;
}
function musGameOver(){
  if(MUS.muted)return;const ctx=musCtx();if(!ctx)return;const now=ctx.currentTime;
  [330,294,261,220,196].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.10,now+i*0.35);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.35+0.8);o.connect(g);g.connect(MUS.gain);o.start(now+i*0.35);o.stop(now+i*0.35+0.8);});
}
function musVictory(){
  if(MUS.muted)return;const ctx=musCtx();if(!ctx)return;const now=ctx.currentTime;
  [261,330,392,523,659,784].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.12,now+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.3);o.connect(g);g.connect(MUS.gain);o.start(now+i*0.1);o.stop(now+i*0.1+0.3);});
}
function musStop(){MUS.world=null;_mNext=0;}
function musToggle(){MUS.muted=!MUS.muted;if(MUS.gain)MUS.gain.gain.value=MUS.muted?0:0.12;return MUS.muted;}




function gDrawCircleImg(img,x,y,r){
  gCtx.save();gCtx.beginPath();gCtx.arc(x,y,r,0,Math.PI*2);gCtx.clip();
  if(img&&img.complete&&img.naturalWidth>0)gCtx.drawImage(img,x-r,y-r,r*2,r*2);
  else{gCtx.fillStyle="#333";gCtx.fill();}
  gCtx.restore();
}

// Enemy death explosion (bigger, colored)
function gKillEnemy(e){
  SFX.enemyDie();
  // Big ring explosion
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2,s=3+Math.random()*6;
    gExplosions.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*5,alpha:1,color:e.color});
  }
  gAddFloat(e.x,e.y,"💥 +"+Math.floor(50*gDiffMult),"#ff4488");
  gScore+=Math.floor(50*gDiffMult);
  gCombo++;gComboT=90;
  e.x=-999;
}

function gLoop(ts){
  if(gState!=="playing")return;
  const dt=Math.min((ts-gLastTs)/16,3);gLastTs=ts;gFc++;
  const cfg=DIFF_CFG[gDiff];
  const curSpd=gBoost?gSpd*2.2:gSpd;

  // Screen shake
  if(gScreenShake>0){
    gScreenShakeX=(Math.random()-0.5)*gScreenShake;
    gScreenShakeY=(Math.random()-0.5)*gScreenShake;
    gScreenShake=Math.max(0,gScreenShake-1.2);
  } else {gScreenShakeX=0;gScreenShakeY=0;}

  gCtx.save();
  gCtx.translate(gScreenShakeX,gScreenShakeY);

  // BG gradient
  const bg=gCtx.createLinearGradient(0,0,GC.width,GC.height);
  bg.addColorStop(0,"#020008");bg.addColorStop(0.5,"#050118");bg.addColorStop(1,"#080520");
  // Zone background tint
  const _zi=MUSIC.getZoneIdx();
  const _zbg=[['#1a0500','#080520'],['#1a1000','#08050a'],['#001a00','#050a05'],['#001a1a','#000a10'],['#0a001a','#05000f']];
  const _zb=_zbg[_zi]||_zbg[0];
  const zoneBg=gCtx.createLinearGradient(0,0,GC.width,GC.height);
  zoneBg.addColorStop(0,_zb[0]);zoneBg.addColorStop(1,_zb[1]);
  gCtx.fillStyle=zoneBg;gCtx.fillRect(0,0,GC.width,GC.height);

  // Nebulas
  gNebulas.forEach(n=>{
    const gr=gCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    gr.addColorStop(0,n.color+Math.floor(n.a*255).toString(16).padStart(2,"0"));
    gr.addColorStop(1,"transparent");
    gCtx.fillStyle=gr;gCtx.beginPath();gCtx.arc(n.x,n.y,n.r,0,Math.PI*2);gCtx.fill();
    n.x-=curSpd*0.08*dt;if(n.x<-n.r){n.x=GC.width+n.r;n.y=Math.random()*GC.height;}
  });

  // Stars (parallax)
  gBgStars.forEach(s=>{
    s.tw+=0.02;const twinkle=s.a*(0.8+0.2*Math.sin(s.tw));
    gCtx.beginPath();gCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    gCtx.fillStyle=`rgba(255,255,255,${twinkle})`;gCtx.fill();
    s.x-=s.s*(gBoost?2.5:1)*dt;
    if(s.x<0){s.x=GC.width;s.y=Math.random()*GC.height;}
  });

  moonDraw();

  gDist+=curSpd*dt*0.012;
  gNoHitDist+=curSpd*dt*0.012;
  if(gFc%500===0){gSpd=Math.min(gSpd+0.3,10);}

  // Spawn
  const cFreq=Math.max(18,cfg.coinFreq-gFc*0.008|0);
  const eFreq=Math.max(40,cfg.enemyFreq-gFc*0.015|0);
  if(gFc%cFreq===0)gSpawnCoin();
  if(gFc%eFreq===0)gSpawnEnemy();
  if(gFc%260===0)gSpawnPU();
  if(gFc%3===0)gAddTrail();

  // Physics
  // Apply velocity to position
  gM.vx=(gM.vx||0)*0.88; gM.x+=gM.vx*dt;
  gM.vy+=(gBoost?0.18:0.4)*dt; gM.y+=gM.vy*dt;
  // X bounds
  const leftBound=GC.width*0.06, rightBound=GC.width*0.65;
  if(gM.x<leftBound){gM.x=leftBound; gM.vx=0;}
  if(gM.x>rightBound){gM.x=rightBound; gM.vx=0;}
  const top=GC.height*0.05, bot=GC.height*0.93;
  if(gM.y<top){gM.y=top; gM.vy=Math.abs(gM.vy)*0.3;}
  if(gM.y>bot){gM.y=bot; gM.vy=-Math.abs(gM.vy)*0.4; gTakeDmg(4);}

  // Particles (engine trail)
  gParticles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.a-=0.04*dt;p.r*=0.97;});
  if(gParticles.length>80)gParticles.splice(0,gParticles.length-80);
  if(gParticles.length>60)gParticles.length=60;
  gParticles=gParticles.filter(p=>p.a>0);
  gParticles.forEach(p=>{
    gCtx.beginPath();gCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    gCtx.fillStyle=p.color==="#ffcc00"?`rgba(255,204,0,${p.a})`:`rgba(255,107,0,${p.a})`;
    gCtx.fill();
  });

  // Coins
  gCoins.forEach(c=>{
    c.x-=curSpd*dt;c.a+=0.06;
    if(gMagnet&&gD2(c,gM)<180){c.x+=(gM.x-c.x)*0.13;c.y+=(gM.y-c.y)*0.13;}
    const gr=gCtx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r+6);
    gr.addColorStop(0,"rgba(255,200,0,0.15)");gr.addColorStop(1,"transparent");
    gCtx.fillStyle=gr;gCtx.beginPath();gCtx.arc(c.x,c.y,c.r+6,0,Math.PI*2);gCtx.fill();
    gCtx.save();gCtx.translate(c.x,c.y);gCtx.rotate(c.a);
    gCtx.font=`${c.r*2.2}px serif`;gCtx.textAlign="center";gCtx.textBaseline="middle";gCtx.fillText("🪐",0,0);
    gCtx.restore();
    if(gD2(c,gM)<(c.r+gM.sz*0.75)){
      const v=c.t==="super"?5:c.t==="big"?3:1;
      gMdc+=v;gScore+=v*10*(gCombo>3?2:1);gCombo++;gComboT=80;
      v>1?SFX.bigCoin():SFX.coin();
      gAddExp(c.x,c.y,"#ffcc00",5);gAddFloat(c.x,c.y,`+${v}🪐`,"#ffcc00");
      if(gCombo>4)gAddFloat(c.x,c.y-28,`${gCombo}x COMBO!`,"#ff4488");
      c.x=-999;
      checkAch(gScore,gMdc,gDist,gNoHitDist,gDiff);
    }
  });
  gCoins=gCoins.filter(c=>c.x>-50);

  // Enemies
  gEnemies.forEach(e=>{
    e.x-=(curSpd+e.spd)*dt;
    e.y=e.baseY+Math.sin(gFc*0.035+e.wPhase)*e.wAmp;
    // Glow
    gCtx.beginPath();gCtx.arc(e.x,e.y,e.size+8,0,Math.PI*2);
    gCtx.fillStyle=e.color+"18";gCtx.fill();
    const img=EIMGS[e.key];
    if(img&&img.complete&&img.naturalWidth>0){
      gDrawCircleImg(img,e.x,e.y,e.size);
    } else {
      // emoji fallback
      gCtx.beginPath();gCtx.arc(e.x,e.y,e.size,0,Math.PI*2);
      gCtx.fillStyle=e.color+"33";gCtx.fill();
      gCtx.font=`${e.size*1.4}px serif`;gCtx.textAlign="center";gCtx.textBaseline="middle";
      gCtx.fillText(e.emoji,e.x,e.y);
    }
    gCtx.beginPath();gCtx.arc(e.x,e.y,e.size,0,Math.PI*2);
    gCtx.strokeStyle=e.color+"88";gCtx.lineWidth=2;gCtx.stroke();
    gCtx.font="bold 8px 'Orbitron',monospace";gCtx.fillStyle=e.color+"cc";
    gCtx.textAlign="center";gCtx.fillText(e.label,e.x,e.y+e.size+10);

    if(gD2(e,gM)<(e.size+gM.sz*0.6)){
      if(gShield){
        gShield=false;gShieldT=0;SFX.shield();
        gKillEnemy(e);
        gAddFloat(e.x,e.y,"🛡 REFLECT!","#4488ff");
      } else {
        gTakeDmg(e.dmg);
        gAddExp(e.x,e.y,"#ff4444",8);gAddFloat(e.x,e.y,`-${e.dmg}HP`,"#ff4444");
        gScreenShake=14;e.x=-999;
      }
    }
  });
  gEnemies=gEnemies.filter(e=>e.x>-80);

  // Powerups
  gPowerups.forEach(p=>{
    p.x-=curSpd*dt;p.a+=0.04;
    gCtx.beginPath();gCtx.arc(p.x,p.y,p.r+6,0,Math.PI*2);
    gCtx.fillStyle=p.c+"22";gCtx.fill();
    gCtx.save();gCtx.translate(p.x,p.y);gCtx.rotate(Math.sin(p.a)*0.25);
    gCtx.font="26px serif";gCtx.textAlign="center";gCtx.textBaseline="middle";gCtx.fillText(p.e,0,0);
    gCtx.restore();
    if(gD2(p,gM)<(p.r+gM.sz*0.8)){gApplyPU(p.t,p.x,p.y);p.x=-999;}
  });
  gPowerups=gPowerups.filter(p=>p.x>-50);

  // Explosions
  gExplosions.forEach(e=>{e.x+=e.vx*dt;e.y+=e.vy*dt;e.alpha-=0.03*dt;e.vx*=0.94;e.vy*=0.94;});
  gExplosions=gExplosions.filter(e=>e.alpha>0);
  gExplosions.forEach(e=>{
    gCtx.beginPath();gCtx.arc(e.x,e.y,e.r,0,Math.PI*2);
    gCtx.fillStyle=e.color+Math.floor(e.alpha*255).toString(16).padStart(2,"0");
    gCtx.fill();
  });

  // Floats
  gFloats.forEach(f=>{f.y+=f.vy*dt;f.a-=0.018*dt;});
  gFloats=gFloats.filter(f=>f.a>0);
  gFloats.forEach(f=>{
    gCtx.font="bold 13px 'Orbitron',monospace";gCtx.textAlign="center";
    gCtx.fillStyle=f.color+Math.floor(f.a*255).toString(16).padStart(2,"0");
    gCtx.fillText(f.txt,f.x,f.y);
  });

  // Timers
  if(gComboT>0){gComboT-=dt;if(gComboT<=0)gCombo=0;}
  if(gShieldT>0){gShieldT-=dt;if(gShieldT<=0){gShield=false;}}
  if(gBoostT>0){gBoostT-=dt;if(gBoostT<=0){gBoost=false;}}
  if(gMagnetT>0){gMagnetT-=dt;if(gMagnetT<=0)gMagnet=false;}

  applyKeys();
  joyApply(dt);
  musUpdate();

  gDrawBullets();
  gDrawWeaponUI();

  // FPS counter (top right)
  if(typeof _fps==='undefined') window._fps=60;
  if(typeof _fpsT==='undefined') window._fpsT=0;
  _fpsT++; if(_fpsT%30===0){const now2=performance.now();_fps=Math.round(30000/(now2-(window._fpsLast||now2)));window._fpsLast=now2;}
  gCtx.font='10px monospace'; gCtx.fillStyle='rgba(255,255,255,0.4)';
  gCtx.textAlign='right'; gCtx.fillText(_fps+'fps', GC.width-8, 20);

  // Draw Marcel
  gCtx.save();gCtx.translate(gM.x,gM.y);
  const tilt=Math.max(-0.4,Math.min(0.4,gM.vy*0.04));gCtx.rotate(tilt);
  if(gShield){
    gCtx.beginPath();gCtx.arc(0,0,gM.sz+12,0,Math.PI*2);
    gCtx.fillStyle=`rgba(68,136,255,${0.1+Math.sin(gFc*0.15)*0.07})`;gCtx.fill();
    gCtx.strokeStyle=`rgba(68,136,255,0.5)`;gCtx.lineWidth=2;gCtx.stroke();
  }
  if(gBoost){
    const bg2=gCtx.createRadialGradient(-25,0,0,-25,0,36);
    bg2.addColorStop(0,"rgba(255,204,0,0.45)");bg2.addColorStop(1,"transparent");
    gCtx.fillStyle=bg2;gCtx.beginPath();gCtx.ellipse(-25,0,40,14,0,0,Math.PI*2);gCtx.fill();
  }
  gCtx.beginPath();gCtx.arc(0,0,gM.sz,0,Math.PI*2);gCtx.clip();
  if(MARCEL_IMG.complete&&MARCEL_IMG.naturalWidth>0)gCtx.drawImage(MARCEL_IMG,-gM.sz,-gM.sz,gM.sz*2,gM.sz*2);
  else{gCtx.fillStyle="#111";gCtx.fill();gCtx.font=`${gM.sz*1.6}px serif`;gCtx.textAlign="center";gCtx.textBaseline="middle";gCtx.fillText("🐶",0,0);}
  gCtx.restore();
  gCtx.beginPath();gCtx.arc(gM.x,gM.y,gM.sz,0,Math.PI*2);
  gCtx.strokeStyle=gShield?"rgba(68,136,255,0.7)":"rgba(255,107,0,0.45)";gCtx.lineWidth=2;gCtx.stroke();

  // Combo display
  if(gCombo>2){
    const comboAlpha=Math.min(1,gComboT/20);
    gCtx.font=`bold ${Math.min(16+gCombo,26)}px 'Orbitron',monospace`;
    gCtx.fillStyle=`rgba(255,68,136,${comboAlpha*0.9})`;
    gCtx.textAlign="center";gCtx.fillText(`${gCombo}x COMBO!`,GC.width/2,GC.height*0.14);
  }

  joyDraw();

  gCtx.restore(); // end screen shake

  // Score increment
  gScore+=Math.floor(curSpd*dt*0.35);

  // Periodic achievement check
  if(gFc%60===0)checkAch(gScore,gMdc,gDist,gNoHitDist,gDiff);

  gUpdateHUD();
  requestAnimationFrame(gLoop);
}

  const y=GC.height*0.1+Math.random()*GC.height*0.78;
  const t=Math.random()<0.08?"big":Math.random()<0.03?"super":"norm";
  gCoins.push({x:GC.width+20,y,r:t==="super"?18:t==="big"?14:10,t,a:0});
}

}
function gSpawnPU(){
  const types=[{e:"🛡",t:"shield",c:"#4488ff"},{e:"⚡",t:"boost",c:"#ffcc00"},{e:"⭐",t:"life",c:"#ff88ff"},{e:"💊",t:"heal",c:"#00ff88"},{e:"🧲",t:"magnet",c:"#ff6b00"}];
  const p=types[Math.floor(Math.random()*types.length)];
  gPowerups.push({x:GC.width+20,y:GC.height*0.15+Math.random()*GC.height*0.7,...p,r:18,a:0});

  if(gState!=="playing")return;

// ═══════════════════════════════════════════
// MUSIC SYSTEM — Situational + Planet-based
// ═══════════════════════════════════════════
const MUSIC = {
  ctx: null,
  nodes: [],       // active oscillators/gains
  masterGain: null,
  currentMood: null,
  currentZone: -1,
  fadeTimer: null,

  // Planet themes: [rootNote, scale, tempo, waveform, vibe]
  ZONES: [
    // Zone 0: Mars (0-50 ly) — epic, heroic, orange
    {name:'mars',   root:220, scale:[0,2,4,7,9],    bpm:95,  wave:'sawtooth', bass:'square',   color:'#ff6b00'},
    // Zone 1: Doge (50-120 ly) — funky, bouncy, golden
    {name:'doge',   root:196, scale:[0,3,5,7,10],   bpm:110, wave:'square',   bass:'triangle', color:'#c2a633'},
    // Zone 2: Pepe (120-220 ly) — mysterious, swampy, green
    {name:'pepe',   root:174, scale:[0,2,3,7,8],    bpm:80,  wave:'sine',     bass:'sawtooth', color:'#44aa44'},
    // Zone 3: Crypto (220-350 ly) — cyberpunk, fast, cyan
    {name:'crypto', root:246, scale:[0,2,4,6,8,10], bpm:130, wave:'sawtooth', bass:'sawtooth', color:'#00ccff'},
    // Zone 4: Void (350+ ly) — dark, ambient, purple
    {name:'void',   root:164, scale:[0,1,5,6,10],   bpm:60,  wave:'sine',     bass:'sine',     color:'#8844ff'},
  ],

  getCtx(){
    if(!this.ctx) this.ctx = getAudio();
    return this.ctx;
  },

  getMasterGain(){
    const ctx = this.getCtx();
    if(!ctx) return null;
    if(!this.masterGain || this.masterGain.context.state==='closed'){
      this.masterGain = ctx.createGain();
      this.masterGain.gain.setValueAtTime(0.18, ctx.currentTime);
      this.masterGain.connect(ctx.destination);
    }
    return this.masterGain;
  },

  // Get zone index from distance
  getZoneIdx(){
    if(gDist < 50)  return 0;
    if(gDist < 120) return 1;
    if(gDist < 220) return 2;
    if(gDist < 350) return 3;
    return 4;
  },

  // Frequency from note in scale
  noteFreq(root, semitone, octave=0){
    return root * Math.pow(2, (semitone + octave*12) / 12);
  },

  // Stop all music with fade
  stop(fadeTime=0.5){
    const ctx = this.getCtx();
    if(!ctx) return;
    this.nodes.forEach(({gain, osc}) => {
      try {
        gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + fadeTime);
        setTimeout(() => { try{osc.stop();}catch(e){} }, fadeTime*1000 + 100);
      } catch(e){}
    });
    this.nodes = [];
    this.currentMood = null;
  },

  // Create one oscillator layer
  makeLayer(freq, vol, wave, detune=0){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx || !mg) return null;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = wave;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.detune.setValueAtTime(detune, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(mg);
    osc.start();
    this.nodes.push({osc, gain});
    return {osc, gain};
  },

  // Play mood music for current zone
  play(mood){
    if(this.currentMood === mood) return;
    this.stop(0.4);
    setTimeout(() => this._startMood(mood), 450);
  },

  _startMood(mood){
    const ctx = this.getCtx();
    if(!ctx || gState !== 'playing') return;
    this.currentMood = mood;
    const zi = this.getZoneIdx();
    const zone = this.ZONES[zi];
    const root = zone.root;
    const scale = zone.scale;
    const bpm = zone.bpm;

    if(mood === 'normal'){
      this._playZoneTheme(zi, root, scale, bpm, 1.0);
    } else if(mood === 'danger'){
      this._playZoneTheme(zi, root, [0,1,3,6,8], bpm*1.45, 1.5);
      this.makeLayer(root/2, 0.06, 'sawtooth', -8);
    } else if(mood === 'lowHP'){
      this._playPulse(root/2, bpm*0.9, 0.08, zone.bass);
      this._playZoneTheme(zi, root, [0,1,5,6], bpm*0.85, 0.8);
    } else if(mood === 'gameover'){
      this._playDescend(root, scale);
    } else if(mood === 'victory'){
      this._playFanfare(root, scale);
    }
  },

  // Zone-specific musical personalities
  _playZoneTheme(zi, root, scale, bpm, volMult){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx || !mg) return;

    if(zi === 0) {
      // ══ MARS ══ Epic heroic — dotted rhythm, power chords, military feel
      // Bass: heavy sawtooth with rhythm pattern SHORT-SHORT-LONG
      this._playRhythm(root/2, [1,0,1,0,0,1,0,0], bpm, 'sawtooth', 0.10*volMult);
      // Melody: ascending heroic fanfare pattern
      const heroScale = scale.map(n=>n+12);
      this._playPattern(root, [...heroScale, heroScale[4], heroScale[2], heroScale[0]], bpm*0.5, 'sawtooth', 0.07*volMult);
      // Pad: power chord drone
      this.makeLayer(this.noteFreq(root, scale[0]), 0.025*volMult, 'square', 0);
      this.makeLayer(this.noteFreq(root, scale[2]), 0.020*volMult, 'square', 7);
      this.makeLayer(this.noteFreq(root, scale[4]), 0.015*volMult, 'sine', -4);

    } else if(zi === 1) {
      // ══ DOGE PLANET ══ Funky bouncy — syncopated, major pentatonic, upbeat
      // Bass: bouncy staccato
      this._playRhythm(root/2, [1,0,0,1,1,0,1,0], bpm, 'triangle', 0.09*volMult);
      // Melody: fast playful arpeggio skipping notes
      const dogeScale = [0,4,7,11,12,16,19]; // major 7th
      this._playPattern(root, dogeScale, bpm*0.75, 'square', 0.06*volMult);
      // High playful chirp
      this._playArp(root*2, [0,4,7,12], bpm*1.2, 'sine', 0.03*volMult);
      this.makeLayer(this.noteFreq(root, 7), 0.02*volMult, 'triangle', 5);

    } else if(zi === 2) {
      // ══ PEPE SWAMP ══ Mysterious eerie — minor, chromatic, swampy bubbles
      // Bass: slow ominous throb
      this._playRhythm(root/2, [1,0,0,0,1,0,0,0], bpm*0.6, 'sawtooth', 0.12*volMult);
      // Melody: chromatic creep, slow
      const swampScale = [0,1,3,5,6,8,10]; // diminished/chromatic
      this._playPattern(root, swampScale, bpm*0.4, 'sine', 0.055*volMult);
      // Eerie high wobble
      const wobble = this.makeLayer(root*4, 0.025*volMult, 'sine', 0);
      if(wobble) {
        let wt=0;
        const wInterval = setInterval(()=>{
          if(!this.currentMood || gState!=='playing'){clearInterval(wInterval);return;}
          wobble.osc.detune.setValueAtTime(Math.sin(wt)*80, ctx.currentTime);
          wt+=0.15;
        }, 50);
      }
      // Dark pad
      this.makeLayer(this.noteFreq(root, scale[1]), 0.03*volMult, 'sawtooth', -12);

    } else if(zi === 3) {
      // ══ CRYPTO CITY ══ Cyberpunk techno — 4-on-floor, arpeggiated synth, digital
      // Kick drum simulation (low thud every beat)
      this._playRhythm(root/4, [1,0,1,0,1,0,1,0], bpm, 'sawtooth', 0.14*volMult);
      // Techno arpeggio — fast 16th notes
      const cyberScale = [0,2,4,6,8,10,12]; // whole tone
      this._playArp(root, cyberScale, bpm*2, 'sawtooth', 0.05*volMult);
      // Synth lead
      this._playPattern(root*2, [0,0,4,0,7,0,10,4], bpm*0.5, 'square', 0.04*volMult);
      // Hi-hat noise
      this._playHihat(bpm*2, 0.04*volMult);
      this.makeLayer(this.noteFreq(root, 6), 0.02*volMult, 'sawtooth', 6);

    } else if(zi === 4) {
      // ══ VOID ══ Dark ambient — atonal, slow, unsettling, huge reverb feel
      // Deep slow bass drone — detuned
      this.makeLayer(root/4, 0.08*volMult, 'sine', 0);
      this.makeLayer(root/4 * 1.01, 0.06*volMult, 'sine', -3); // slight detune = beat frequency
      // Slow haunting melody — tritone scale
      const voidScale = [0,1,6,7,8,13]; // tritone pairs
      this._playPattern(root, voidScale, bpm*0.3, 'sine', 0.05*volMult);
      // High shimmer
      const shimmer = this.makeLayer(root*8, 0.015*volMult, 'sine', 0);
      if(shimmer){
        let st=0;
        const sInterval = setInterval(()=>{
          if(!this.currentMood||gState!=='playing'){clearInterval(sInterval);return;}
          shimmer.osc.frequency.setValueAtTime(root*8*(1+Math.sin(st)*0.1), ctx.currentTime);
          shimmer.gain.gain.setValueAtTime(0.015*volMult*(0.5+Math.sin(st*0.7)*0.5), ctx.currentTime);
          st+=0.04;
        }, 60);
      }
    }
  },

  // Rhythmic pattern: noteArray is booleans [1,0,1,0...] for hit/rest
  _playRhythm(freq, pattern, bpm, wave, vol){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx||!mg) return;
    const interval = 60/bpm * 0.5;
    let step=0;
    const tick=()=>{
      if(gState!=='playing'||!this.currentMood) return;
      if(pattern[step%pattern.length]){
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=wave; o.frequency.setValueAtTime(freq, ctx.currentTime);
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+interval*0.6);
        o.connect(g); g.connect(mg); o.start(); o.stop(ctx.currentTime+interval*0.6);
      }
      step++;
      setTimeout(tick, interval*1000);
    };
    tick();
  },

  // Melodic pattern: fixed note sequence
  _playPattern(root, noteSeq, bpm, wave, vol){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx||!mg) return;
    const interval = 60/bpm;
    let step=0;
    const play=()=>{
      if(gState!=='playing'||!this.currentMood) return;
      const semi = noteSeq[step%noteSeq.length];
      const freq = root * Math.pow(2, semi/12);
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=wave; o.frequency.setValueAtTime(freq, ctx.currentTime);
      o.detune.setValueAtTime((Math.random()-0.5)*4, ctx.currentTime);
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+interval*0.85);
      o.connect(g); g.connect(mg); o.start(); o.stop(ctx.currentTime+interval*0.85);
      step++;
      setTimeout(play, interval*1000);
    };
    play();
  },

  // Hi-hat noise bursts for techno
  _playHihat(bpm, vol){
    const ctx=this.getCtx(); const mg=this.getMasterGain();
    if(!ctx||!mg) return;
    const interval=60/bpm;
    const tick=()=>{
      if(gState!=='playing'||!this.currentMood) return;
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*vol;
      const src=ctx.createBufferSource();
      const flt=ctx.createBiquadFilter(); flt.type='highpass'; flt.frequency.value=8000;
      const g=ctx.createGain();
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.04);
      src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(mg); src.start();
      setTimeout(tick, interval*1000);
    };
    tick();
  },

    // Pulsing bass (heartbeat)
  _pulseTimer: null,
  _playPulse(freq, bpm, vol, wave){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx || !mg) return;
    const interval = 60/bpm;
    const pulse = () => {
      if(gState !== 'playing' || !this.currentMood) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = wave;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + interval*0.4);
      osc.connect(g); g.connect(mg);
      osc.start(); osc.stop(ctx.currentTime + interval*0.4);
      // Double beat
      setTimeout(()=>{
        if(!this.currentMood) return;
        const o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.type=wave; o2.frequency.setValueAtTime(freq*1.2, ctx.currentTime);
        g2.gain.setValueAtTime(vol*0.7, ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.1);
        o2.connect(g2);g2.connect(mg);o2.start();o2.stop(ctx.currentTime+0.1);
      }, interval*200);
      this._pulseTimer = setTimeout(pulse, interval*1000);
    };
    pulse();
  },

  // Descending game over
  _playDescend(root, scale){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx || !mg) return;
    const notes = [...scale].reverse().map(n => root * Math.pow(2, n/12));
    notes.forEach((freq, i) => {
      setTimeout(()=>{
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);
        osc.connect(g); g.connect(mg);
        osc.start(); osc.stop(ctx.currentTime+0.6);
      }, i*300);
    });
  },

  // Victory fanfare
  _playFanfare(root, scale){
    const ctx = this.getCtx();
    const mg = this.getMasterGain();
    if(!ctx || !mg) return;
    const notes = scale.map(n => root * Math.pow(2, n/12));
    notes.forEach((freq, i) => {
      setTimeout(()=>{
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='square'; osc.frequency.setValueAtTime(freq*2, ctx.currentTime);
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
        osc.connect(g); g.connect(mg);
        osc.start(); osc.stop(ctx.currentTime+0.4);
      }, i*120);
    });
  },

  // Update every frame — check situation
  update(){
    if(gState !== 'playing') return;

    // Check zone change
    const zi = this.getZoneIdx();
    if(zi !== this.currentZone){
      this.currentZone = zi;
      this.currentMood = null; // force restart
      // Show zone name
      const z = this.ZONES[zi];
      gAddFloat && gAddFloat(GC.width*0.5, GC.height*0.3, z.name+'  '+z.color, z.color, 22);
    }

    // Determine mood
    const enemiesNear = gEnemies.filter(e => Math.abs(e.x - gM.x) < 200).length;
    let mood = 'normal';
    if(gHp < 25) mood = 'lowHP';
    else if(enemiesNear >= 2) mood = 'danger';

    if(mood !== this.currentMood) this.play(mood);
  },

  // Called on game start
  start(){ this.currentZone = -1; this.currentMood = null; this.play('normal'); },

  // Called on game over
  gameOver(){ this.stop(0.3); setTimeout(()=>this._startMood('gameover'), 400); },

  // Called on pause
  pause(){ if(this.masterGain){ const ctx=this.getCtx(); this.masterGain.gain.linearRampToValueAtTime(0.02, ctx.currentTime+0.3); } },
  resume(){ if(this.masterGain){ const ctx=this.getCtx(); this.masterGain.gain.linearRampToValueAtTime(0.18, ctx.currentTime+0.3); } },

  // Mute toggle
  muted: false,
  toggleMute(){
    this.muted = !this.muted;
    if(this.masterGain){
      const ctx=this.getCtx();
      this.masterGain.gain.linearRampToValueAtTime(this.muted?0:0.18, ctx.currentTime+0.2);
    }
    return this.muted;
  }
};

// ═══ JOYSTICK (drawn on canvas) ═══
const JOY={
  active:false, id:-1,
  baseX:0, baseY:0,
  stickX:0, stickY:0,
  dx:0, dy:0,
  R:70, dead:10,
  visible:false
};

function dpadShow(show){ JOY.visible=show; if(!show)joyReset(); }
function joyShow(show){ dpadShow(show); }

function joyReset(){
  JOY.active=false; JOY.dx=0; JOY.dy=0; JOY.visible=true;
  // reset stick to base
  JOY.stickX=JOY.baseX; JOY.stickY=JOY.baseY;
}

function joyDraw(){
  if(!JOY.visible||gState!=="playing")return;
  const ctx=gCtx;
  const bx=JOY.baseX, by=JOY.baseY, R=JOY.R;
  // outer ring
  ctx.beginPath(); ctx.arc(bx,by,R,0,Math.PI*2);
  ctx.fillStyle="rgba(255,107,0,0.08)";
  ctx.fill();
  ctx.strokeStyle="rgba(255,107,0,0.5)";
  ctx.lineWidth=2.5; ctx.stroke();
  // inner stick
  ctx.beginPath(); ctx.arc(JOY.stickX,JOY.stickY,28,0,Math.PI*2);
  const g=ctx.createRadialGradient(JOY.stickX-8,JOY.stickY-8,2,JOY.stickX,JOY.stickY,28);
  g.addColorStop(0,"rgba(255,160,60,0.9)");
  g.addColorStop(1,"rgba(255,107,0,0.6)");
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle="rgba(255,200,80,0.7)";
  ctx.lineWidth=2; ctx.stroke();
}

function joyTouchStart(e){
  if(gState!=="playing")return false;
  const bx=GC.getBoundingClientRect();
  const scaleX=GC.width/bx.width, scaleY=GC.height/bx.height;
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const cx=(t.clientX-bx.left)*scaleX;
    const cy=(t.clientY-bx.top)*scaleY;
    // left 42% bottom 45% of canvas
    if(cx<GC.width*0.42 && cy>GC.height*0.55){
      JOY.active=true; JOY.id=t.identifier;
      JOY.baseX=cx; JOY.baseY=cy;
      JOY.stickX=cx; JOY.stickY=cy;
      JOY.dx=0; JOY.dy=0;
      return true;
    }
  }
  return false;
}

function joyTouchMove(e){
  if(!JOY.active)return;
  const bx=GC.getBoundingClientRect();
  const scaleX=GC.width/bx.width, scaleY=GC.height/bx.height;
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(t.identifier!==JOY.id)continue;
    const cx=(t.clientX-bx.left)*scaleX;
    const cy=(t.clientY-bx.top)*scaleY;
    const ddx=cx-JOY.baseX, ddy=cy-JOY.baseY;
    const dist=Math.hypot(ddx,ddy);
    const clamped=Math.min(dist,JOY.R);
    const angle=Math.atan2(ddy,ddx);
    JOY.stickX=JOY.baseX+Math.cos(angle)*clamped;
    JOY.stickY=JOY.baseY+Math.sin(angle)*clamped;
    JOY.dx=dist>JOY.dead ? Math.cos(angle)*(clamped/JOY.R) : 0;
    JOY.dy=dist>JOY.dead ? Math.sin(angle)*(clamped/JOY.R) : 0;
  }
}

function joyTouchEnd(e){
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===JOY.id){ joyReset(); break; }
  }
}

function joyApply(dt){
  if(!JOY.active||gState!=="playing")return;
  const spd=12;
  if(Math.abs(JOY.dx)>0.05) gM.vx=JOY.dx*spd;
  if(Math.abs(JOY.dy)>0.05) gM.vy=JOY.dy*spd;
}

// WEAPON SYSTEM
// ═══════════════════════════════════════════
const WEAPONS = [
  { id:'shotgun',  name:'Плазма-Дробовик', emoji:'🔱', cooldown:600,  ammo:Infinity, color:'#ff6b00' },
  { id:'rifle',    name:'Имп. Винтовка',   emoji:'⚡',  cooldown:180,  ammo:Infinity, color:'#00ccff' },
  { id:'gravity',  name:'Грав. Винтовка',  emoji:'🌀',  cooldown:1200, ammo:Infinity, color:'#9933ff' },
  { id:'emi',      name:'ЭМИ-Граната',     emoji:'💥',  cooldown:3000, ammo:3,        color:'#00ff88' },
  { id:'dash',     name:'Рак. Рывок',      emoji:'🚀',  cooldown:800,  ammo:Infinity, color:'#ffcc00' },
];

let gWeaponIdx = 0;
let gWeaponCooldowns = {};
let gBullets = [];
let gGravWells = [];
let gDashCooldown = 0;

function gCurrentWeapon(){ return WEAPONS[gWeaponIdx]; }

function gShoot(targetX, targetY) {
  const w = gCurrentWeapon();
  const now = Date.now();
  if ((gWeaponCooldowns[w.id]||0) > now) return;
  haptic('medium');
  if (w.ammo !== Infinity && w.ammo <= 0) return;
  gWeaponCooldowns[w.id] = now + w.cooldown;

  const cx = gM.x, cy = gM.y;
  const dx = (targetX||GC.width) - cx;
  const dy = (targetY||cy) - cy;
  const dist = Math.hypot(dx, dy) || 1;
  const nx = dx/dist, ny = dy/dist;

  haptic('medium');
  if (w.id === 'shotgun') {
    // Wide cone — 7 pellets
    for (let i = -3; i <= 3; i++) {
      const angle = Math.atan2(ny, nx) + i * 0.18;
      gBullets.push({ x:cx, y:cy, vx:Math.cos(angle)*14, vy:Math.sin(angle)*14,
        type:'shotgun', r:5, dmg:18, life:35, color:'#ff6b00', trail:[] });
    }
    SFX.jump && SFX.jump();
  } else if (w.id === 'rifle') {
    // 3 rapid bursts
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const spread = (Math.random()-0.5)*0.08;
        gBullets.push({ x:gM.x, y:gM.y, vx:nx*18+spread, vy:ny*18+spread,
          type:'rifle', r:4, dmg:12, life:45, color:'#00ccff', trail:[] });
      }, i * 80);
    }
  } else if (w.id === 'gravity') {
    // Black hole projectile
    gBullets.push({ x:cx, y:cy, vx:nx*8, vy:ny*8,
      type:'gravity', r:12, dmg:0, life:90, color:'#9933ff', trail:[], pullRadius:100, pullForce:6 });
  } else if (w.id === 'emi') {
    // EMP burst at Marcel position
    gBullets.push({ x:cx, y:cy, vx:0, vy:0,
      type:'emi', r:5, dmg:0, life:5, color:'#00ff88', trail:[], explodeR:0 });
    w.ammo = Math.max(0, (w.ammo===Infinity?3:w.ammo) - 1);
  } else if (w.id === 'dash') {
    // Rocket dash in aim direction
    gM.vx = nx * 22;
    gM.vy = ny * 22;
    // Dash particles
    for (let i = 0; i < 8; i++) {
      gParticles.push({ x:cx, y:cy, vx:-nx*8+((Math.random()-0.5)*6),
        vy:-ny*8+((Math.random()-0.5)*6), life:20, color:'#ffcc00', r:4 });
    }
  }
}

function gUpdateBullets(dt) {
  // Update bullets
  gBullets.forEach(b => {
    b.trail.push({x:b.x, y:b.y});
    if (b.trail.length > 4) b.trail.shift();
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Gravity well pulls enemies
    if (b.type === 'gravity') {
      gEnemies.forEach(e => {
        const d = Math.hypot(e.x-b.x, e.y-b.y);
        if (d < b.pullRadius) {
          const pull = b.pullForce * (1 - d/b.pullRadius);
          e.x += (b.x-e.x)/d * pull * dt;
          e.y += (b.y-e.y)/d * pull * dt;
        }
      });
    }

    // EMP explosion
    if (b.type === 'emi' && b.life <= 0 && b.explodeR < 150) {
      b.explodeR = 150;
      b.life = 20;
      gEnemies.forEach(e => {
        if (Math.hypot(e.x-b.x, e.y-b.y) < 150) {
          e.emied = 180; e.spd = 0;
        }
      });
    }

    // Hit detection
    gEnemies.forEach((e, ei) => {
      if (b.life <= 0) return;
      const hit = Math.hypot(e.x-b.x, e.y-b.y) < e.size + b.r;
      if (hit && b.type !== 'gravity' && b.type !== 'emi') {
        e.hp = (e.hp || 30) - b.dmg;
        b.life = 0;
        // Hit particles
        for (let i=0;i<5;i++) gParticles.push({
          x:e.x, y:e.y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10,
          life:15, color:e.color, r:3
        });
        if (e.hp <= 0) {
          // Enemy destroyed!
          gScore += 50; gMdc += 2;
          gUpdateHUD();
          for (let i=0;i<12;i++) gParticles.push({
            x:e.x, y:e.y, vx:(Math.random()-0.5)*16, vy:(Math.random()-0.5)*16,
            life:25, color:e.color, r:Math.random()*4+2
          });
          gAddExp && gAddExp(e.x, e.y, '#ffcc00', 50);
          gEnemies.splice(ei, 1);
        }
      }
    });
  });

  // Remove dead bullets (but keep emi explosion briefly)
  gBullets = gBullets.filter(b => b.life > 0 || (b.type==='emi' && b.explodeR > 0));
  if(gBullets.length>20)gBullets.length=20;

  // Restore EMI-stunned enemies
  gEnemies.forEach(e => {
    if (e.emied > 0) {
      e.emied -= dt;
      if (e.emied <= 0) { e.emied = 0; e.spd = ENEMY_DEFS.find(d=>d.key===e.key)?.spd || 1.4; }
    }
  });
}

function gDrawBullets() {
  gBullets.forEach(b => {
    const ctx = gCtx;

    // Trail
    if (b.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(b.trail[0].x, b.trail[0].y);
      b.trail.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = b.color + '66';
      ctx.lineWidth = b.r * 0.6;
      ctx.stroke();
    }

    // EMP explosion ring
    if (b.type === 'emi' && b.explodeR > 0) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.explodeR, 0, Math.PI*2);
      ctx.strokeStyle = '#00ff8888'; ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = '#00ff8811'; ctx.fill();
      b.explodeR -= 8 * 0.016;
      return;
    }

    // Gravity well
    if (b.type === 'gravity') {
      ctx.save();
      const g2 = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
      g2.addColorStop(0,'rgba(153,51,255,0.9)');
      g2.addColorStop(1,'rgba(153,51,255,0)');
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r*3,0,Math.PI*2); ctx.fill();
      // Pull radius ring
      ctx.beginPath(); ctx.arc(b.x,b.y,b.pullRadius,0,Math.PI*2);
      ctx.strokeStyle='#9933ff33'; ctx.lineWidth=1; ctx.stroke();
      ctx.restore();
      return;
    }

    // Normal bullet
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    const bg = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    bg.addColorStop(0,'white'); bg.addColorStop(1,b.color);
    ctx.fillStyle = bg; ctx.fill();
  });
}

function gDrawWeaponUI() {
  if (gState !== 'playing') return;
  const ctx = gCtx;
  const now = Date.now();

  // ── Full weapon bar at bottom ──
  const slotW = Math.min(56, (GC.width-40)/WEAPONS.length - 6), slotH = 58, gap = 5;
  const totalW = WEAPONS.length * (slotW + gap) - gap;
  const startX = (GC.width - totalW) / 2;
  const tgOffset = IS_TG ? 16 : 10;
  const barY = GC.height - slotH - tgOffset;

  WEAPONS.forEach((w, i) => {
    const sx = startX + i * (slotW + gap);
    const isActive = i === gWeaponIdx;
    const cd = gWeaponCooldowns[w.id] || 0;
    const cdRatio = Math.max(0, Math.min(1, (now - (cd - w.cooldown)) / w.cooldown));
    const ready = cdRatio >= 1;

    // Slot background
    ctx.save();
    ctx.fillStyle = isActive ? 'rgba(0,0,0,0.85)' : 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(sx, barY, slotW, slotH, 8); ctx.fill();

    // Active glow border
    if (isActive) {
      ctx.shadowColor = w.color; ctx.shadowBlur = 12;
      ctx.strokeStyle = w.color; ctx.lineWidth = 2;
    } else {
      ctx.strokeStyle = ready ? '#444' : '#222'; ctx.lineWidth = 1;
    }
    ctx.beginPath(); ctx.roundRect(sx, barY, slotW, slotH, 8); ctx.stroke();
    ctx.shadowBlur = 0;

    // Cooldown overlay (dark = reloading)
    if (!ready) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      const ch = slotH * (1 - cdRatio);
      ctx.beginPath(); ctx.roundRect(sx, barY, slotW, ch, [8,8,0,0]); ctx.fill();
    }

    // Emoji icon
    ctx.font = isActive ? '24px serif' : '20px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.globalAlpha = ready ? 1 : 0.55;
    ctx.fillText(w.emoji, sx + slotW/2, barY + 20);
    ctx.globalAlpha = 1;

    // Name label
    ctx.font = '7px Orbitron, monospace';
    ctx.fillStyle = isActive ? w.color : '#888';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const label = w.name.length > 9 ? w.name.slice(0,9) : w.name;
    ctx.fillText(label, sx + slotW/2, barY + 37);

    // Ammo / hotkey
    ctx.font = '8px monospace';
    if (w.ammo !== Infinity) {
      ctx.fillStyle = w.ammo > 0 ? '#ffcc00' : '#ff4444';
      ctx.fillText('×' + w.ammo, sx + slotW/2, barY + 50);
    } else {
      ctx.fillStyle = '#555';
      ctx.fillText('[' + (i+1) + ']', sx + slotW/2, barY + 50);
    }

    // Cooldown pie on active
    if (isActive && !ready) {
      ctx.strokeStyle = w.color + 'aa';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(sx + slotW/2, barY + 20, 14, -Math.PI/2, -Math.PI/2 + Math.PI*2*cdRatio);
      ctx.stroke();
    }

    ctx.restore();
  });

  // ── ACTIVE weapon name tooltip ──
  const w = gCurrentWeapon();
  const cd = gWeaponCooldowns[w.id] || 0;
  const cdRatio = Math.max(0, Math.min(1, (now - (cd - w.cooldown)) / w.cooldown));
  const ready = cdRatio >= 1;

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.roundRect(GC.width/2 - 70, barY - 28, 140, 22, 6); ctx.fill();
  ctx.font = 'bold 10px Orbitron, monospace';
  ctx.fillStyle = ready ? w.color : '#888';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ready ? w.emoji + ' ' + w.name.toUpperCase() : '⏳ ПЕРЕЗАРЯДКА...', GC.width/2, barY - 17);
  ctx.restore();
}


// ═══════════════════════════════════════════
// MOON LANDSCAPE — Space Run background
// ═══════════════════════════════════════════
const MOON = {
  pts: [],      // terrain profile
  craters: [],  // crater positions
  rocks: [],    // rock positions
  offset: 0,
  ready: false,
};

function moonInit() {
  if (MOON.ready) return;
  MOON.ready = true;
  const W = GC.width * 4;
  const H = GC.height;
  const baseY = H * 0.74;
  
  // Generate smooth lunar terrain
  MOON.pts = [];
  for (let x = 0; x <= W; x += 3) {
    const t = x * 0.004;
    let y = baseY
      + Math.sin(t * 1.0) * H * 0.045
      + Math.sin(t * 2.3 + 1.2) * H * 0.025
      + Math.sin(t * 0.5 + 0.7) * H * 0.035
      + (Math.random() - 0.5) * 3;
    MOON.pts.push({ x, y });
  }
  
  // Craters
  MOON.craters = [];
  for (let i = 0; i < 30; i++) {
    MOON.craters.push({
      x: Math.random() * W,
      y: baseY + 6 + Math.random() * 20,
      r: 6 + Math.random() * 22,
      depth: 0.3 + Math.random() * 0.5,
    });
  }
  
  // Rocks
  MOON.rocks = [];
  for (let i = 0; i < 20; i++) {
    MOON.rocks.push({
      x: Math.random() * W,
      y: baseY - 2 - Math.random() * 8,
      w: 4 + Math.random() * 14,
      h: 3 + Math.random() * 10,
    });
  }
}

function moonDraw() {
  if (gState !== 'playing') return;
  if (!MOON.ready || GC.width === 0) moonInit();
  
  const ctx = gCtx;
  const W = GC.width, H = GC.height;
  const totalW = GC.width * 4;
  MOON.offset = (MOON.offset + 1.0) % totalW;
  const off = MOON.offset;

  // ── Sky gradient (deep space) ──
  // Already drawn by game loop — we just add horizon glow
  const hg = ctx.createLinearGradient(0, H * 0.58, 0, H * 0.76);
  hg.addColorStop(0, 'rgba(200,220,255,0)');
  hg.addColorStop(0.7, 'rgba(180,200,240,0.06)');
  hg.addColorStop(1, 'rgba(150,170,210,0.03)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, H * 0.58, W, H * 0.42);

  // ── Far moon mountains (parallax layer 1 — slowest) ──
  ctx.save();
  ctx.fillStyle = '#1a1e2a';
  ctx.beginPath();
  ctx.moveTo(0, H);
  const pts1 = MOON.pts;
  const offA = (off * 0.25) % totalW;
  for (let i = 0; i < pts1.length; i++) {
    let px = pts1[i].x - offA;
    if (px < -3) px += totalW;
    if (px > W + 3) continue;
    const py = pts1[i].y + H * 0.04 + Math.sin(i * 0.08) * 8;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  ctx.restore();

  // ── Mid ground (parallax layer 2) ──
  ctx.save();
  const offB = (off * 0.6) % totalW;
  const grad2 = ctx.createLinearGradient(0, H * 0.7, 0, H);
  grad2.addColorStop(0, '#2a2e3d');
  grad2.addColorStop(0.4, '#1e2230');
  grad2.addColorStop(1, '#141620');
  ctx.fillStyle = grad2;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < pts1.length; i++) {
    let px = pts1[i].x - offB;
    if (px < -3) px += totalW;
    if (px > W + 3) continue;
    const py = pts1[i].y + H * 0.01;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  ctx.restore();

  // ── Main lunar surface (layer 3 — full speed) ──
  ctx.save();
  const offC = off % totalW;
  const surfGrad = ctx.createLinearGradient(0, H * 0.72, 0, H);
  surfGrad.addColorStop(0, '#3a3f50');
  surfGrad.addColorStop(0.3, '#2d3142');
  surfGrad.addColorStop(1, '#1a1c28');
  ctx.fillStyle = surfGrad;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < pts1.length; i++) {
    let px = pts1[i].x - offC;
    if (px < -3) px += totalW;
    if (px > W + 3) continue;
    i === 0 ? ctx.moveTo(px, pts1[i].y) : ctx.lineTo(px, pts1[i].y);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  // Surface edge highlight
  ctx.beginPath();
  for (let i = 0; i < pts1.length; i++) {
    let px = pts1[i].x - offC;
    if (px < -3) px += totalW;
    if (px > W + 3) continue;
    i === 0 ? ctx.moveTo(px, pts1[i].y) : ctx.lineTo(px, pts1[i].y);
  }
  ctx.strokeStyle = 'rgba(180,190,220,0.18)';
  ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // ── Craters ──
  ctx.save();
  MOON.craters.forEach(c => {
    let px = c.x - offC * 1.0;
    if (px < -c.r * 2) px += totalW;
    if (px > W + c.r * 2) return;
    
    // Outer rim
    ctx.beginPath();
    ctx.ellipse(px, c.y, c.r, c.r * 0.35, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200,210,240,0.15)';
    ctx.lineWidth = 1.5; ctx.stroke();
    
    // Inner shadow
    const cg = ctx.createRadialGradient(px, c.y, 0, px, c.y, c.r * 0.8);
    cg.addColorStop(0, `rgba(10,12,20,${c.depth})`);
    cg.addColorStop(1, 'rgba(10,12,20,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(px, c.y, c.r * 0.8, c.r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();

  // ── Rocks ──
  ctx.save();
  MOON.rocks.forEach(r => {
    let px = r.x - offC;
    if (px < -r.w) px += totalW;
    if (px > W + r.w) return;
    ctx.fillStyle = '#404558';
    ctx.beginPath();
    ctx.ellipse(px, r.y, r.w * 0.5, r.h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(200,210,240,0.1)';
    ctx.beginPath();
    ctx.ellipse(px - r.w * 0.1, r.y - r.h * 0.15, r.w * 0.25, r.h * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
}


// ═══ INPUT LISTENERS ═══
GC.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(gState==="start"){gStart();return;}
  if(gState==="pause"){gResume();return;}
  if(gState==="playing"){
    const grabbed=joyTouchStart(e);
    if(!grabbed){
      // Right side = shoot
      const bx=GC.getBoundingClientRect();
      const t=e.changedTouches[0];
      const tx=(t.clientX-bx.left)*(GC.width/bx.width);
      const ty=(t.clientY-bx.top)*(GC.height/bx.height);
      gShoot(tx, ty);
      gHoldTimer=setTimeout(()=>{if(gState==="playing")gPause();},900);
    }
  }
},{passive:false});
GC.addEventListener("touchmove",e=>{
  e.preventDefault();
  joyTouchMove(e);
  // Swipe up on right side = next weapon
  if(gState==="playing" && e.changedTouches.length){
    const t=e.changedTouches[0];
    const bx=GC.getBoundingClientRect();
    const tx=(t.clientX-bx.left)*(GC.width/bx.width);
    if(tx > GC.width*0.6 && e._swipeStartY && (e._swipeStartY - t.clientY) > 40){
      gWeaponIdx=(gWeaponIdx+1)%WEAPONS.length;
      haptic('light');
      e._swipeStartY=null;
    }
  }
},{passive:false});
GC.addEventListener("touchstart",e2=>{
  if(e2.changedTouches.length) e2._swipeStartY=e2.changedTouches[0].clientY;
},{passive:true,capture:true});
GC.addEventListener("touchend",e=>{
  clearTimeout(gHoldTimer);
  joyTouchEnd(e);
  if(gState==="playing"&&e.changedTouches.length){
    const bx=GC.getBoundingClientRect();
    const t=e.changedTouches[0];
    const ty=(t.clientY-bx.top)*(GC.height/bx.height);
    const tx=(t.clientX-bx.left)*(GC.width/bx.width);
    const dy=ty-(_swipeY||ty), dx=tx-(_swipeX||tx);
    const moved = Math.hypot(dx,dy);
    // Bottom weapon bar zone
    if(ty > GC.height*0.82){
      if(Math.abs(dx)>35 && Math.abs(dx)>Math.abs(dy)){
        // Swipe = next/prev weapon
        gWeaponIdx=dx>0?(gWeaponIdx+1)%WEAPONS.length:(gWeaponIdx-1+WEAPONS.length)%WEAPONS.length;
        haptic('light');
      } else if(moved < 15) {
        // Tap on specific slot
        const slotW=56, gap=6;
        const totalW=WEAPONS.length*(slotW+gap)-gap;
        const startX=(GC.width-totalW)/2;
        for(let i=0;i<WEAPONS.length;i++){
          const sx=startX+i*(slotW+gap);
          if(tx>=sx && tx<=sx+slotW){ gWeaponIdx=i; haptic('light'); break; }
        }
      }
    }
  }
},{passive:false});
let _swipeX=0,_swipeY=0;
GC.addEventListener("touchstart",e=>{
  if(e.touches.length){const bx=GC.getBoundingClientRect(),t=e.touches[0];
    _swipeX=(t.clientX-bx.left)*(GC.width/bx.width);
    _swipeY=(t.clientY-bx.top)*(GC.height/bx.height);}
},{passive:true});
GC.addEventListener("click",e=>{
  if(gState==="playing"){
    const bx=GC.getBoundingClientRect();
    const tx=(e.clientX-bx.left)*(GC.width/bx.width);
    const ty=(e.clientY-bx.top)*(GC.height/bx.height);
    gShoot(tx, ty);
  }
});
// Held keys
const KEYS={};
document.addEventListener("keyup",e=>{KEYS[e.code]=false;});
function applyKeys(){
  if(gState!=="playing")return;
  if(KEYS["ArrowUp"]   ||KEYS["KeyW"]){gM.vy=-12;}
  if(KEYS["ArrowDown"] ||KEYS["KeyS"]){gM.vy= 10;}
  if(KEYS["ArrowLeft"] ||KEYS["KeyA"]){gM.vx=-14;}
  if(KEYS["ArrowRight"]||KEYS["KeyD"]){gM.vx= 14;}
}
document.addEventListener("keydown",e=>{
  KEYS[e.code]=true;
  if(e.code==="Space"||e.code==="Enter"){
    e.preventDefault();
    if(gState==="playing")gJump();
    else if(gState==="start")gStart();
    else if(gState==="pause")gResume();
    else if(gState==="gameover")gStart();
  }
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code))e.preventDefault();
  if(e.code==="Escape"){
    if(gState==="playing")gPause();
    else if(gState==="pause")gResume();
    else if(gState==="gameover"||gState==="start")closeGame();
  }
});
// Click anywhere on canvas to start/jump
GC.addEventListener("click",e=>{
  if(gState==="start")gStart();
  else if(gState==="playing")gJump();
  else if(gState==="pause")gResume();
  else if(gState==="gameover")gStart();
});

// Telegram back button support
if(tg?.BackButton){
  tg.BackButton.onClick(()=>{
    if(gState==="playing")gPause();
    else if(gState==="pause"||gState==="gameover"||gState==="start"){closeGame();}
    else{tg.BackButton.hide();}
  });
}

// Init
window.addEventListener('DOMContentLoaded',()=>{
  if(TG_NAME)PS.name=TG_NAME;
  render();
  // Auto-open game on PLAY tab
  setTimeout(()=>{ if(tab==='play') openGame(); }, 100);
});
