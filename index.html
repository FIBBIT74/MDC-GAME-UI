<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MDC GAME</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--mdc:#ff6b00;--geo:#00d4aa;--rcwt:#cc44ff;--rcwe:#ff44cc;--bg:#030303;--bg2:#0a0a0a;--line:#1e1e1e;--muted:#666;--safe-b:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;}
body{display:flex;flex-direction:column;font-family:'Share Tech Mono',monospace;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);}
#hdr{flex-shrink:0;height:62px;background:linear-gradient(180deg,#0a0a0a,#050505);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ff6b0055,transparent);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 16px;}
#bnav{flex-shrink:0;background:#050505;border-top:1px solid var(--line);display:flex;padding-bottom:var(--safe-b);height:calc(62px + var(--safe-b));}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;border-top:2px solid transparent;cursor:pointer;}
.ni{font-size:22px;line-height:1;transition:transform 0.2s;}
.nb.active .ni{transform:scale(1.15);}
.nl{font-size:10px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:1px;}
#notif{position:fixed;top:72px;left:14px;right:14px;z-index:9997;background:#0d0d0d;border-radius:12px;padding:12px 18px;font-size:13px;text-align:center;display:none;animation:ntfIn 0.3s ease;}
#modal{position:fixed;inset:0;z-index:9990;background:#000000cc;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
#mbox{background:linear-gradient(180deg,#0f0f0f,#080808);border:1px solid #1e1e1e;border-radius:24px 24px 0 0;padding:24px 18px 44px;width:100%;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1);}
#mbox::before{content:'';display:block;width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px;}
#bov{position:fixed;inset:0;z-index:9995;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000;overflow-y:auto;}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;transition:transform 0.15s,opacity 0.15s;}
.card:active{transform:scale(0.97);opacity:0.85;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sbox{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 10px;text-align:center;}
.hpbg{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.hpfill{height:100%;border-radius:3px;transition:width 0.6s;}
.bp{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Orbitron',monospace;font-weight:900;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
.bp:active{transform:scale(0.97);}
.bs{padding:9px 14px;border-radius:10px;font-family:'Orbitron',monospace;font-weight:700;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.bs:active{transform:scale(0.95);}
.stitle{font-size:9px;color:var(--muted);letter-spacing:4px;margin-bottom:12px;font-family:'Orbitron',monospace;}
.gtitle{font-size:24px;font-weight:900;letter-spacing:5px;font-family:'Orbitron',monospace;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:6px;}
.mcard{border-radius:16px;padding:16px 12px;position:relative;overflow:hidden;margin-bottom:12px;transition:transform 0.2s;}
.mcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent 60%);pointer-events:none;}
.hex{border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;border:1px solid transparent;}
.hex:active{transform:scale(0.9);}
.pring{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;flex-shrink:0;}
.pring::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(#ff6b00 0% 65%,#1a1a1a 65% 100%);animation:ringRot 3s linear infinite;}
.pring::after{content:'';position:absolute;inset:-1px;border-radius:50%;background:#080808;}
.pring span{position:relative;z-index:1;}
.xpbar{height:8px;background:#111;border-radius:4px;overflow:hidden;margin:6px 0;}
.xpfill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ff6b00,#ffcc00);position:relative;overflow:hidden;}
.xpfill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:xpShim 1.5s infinite;}
.bcard{width:100px;height:130px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;border:2px solid transparent;}
.atk{animation:atkAnim 0.4s ease;}
.hit{animation:hitAnim 0.3s ease;}
.vs{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:#ff4488;text-shadow:0 0 20px #ff4488;}
.particle{position:absolute;width:6px;height:6px;border-radius:50%;animation:pflyAnim 0.8s ease-out forwards;pointer-events:none;}
.win-bg{background:radial-gradient(ellipse at center,#0a2a0a 0%,#030303 70%);}
.loss-bg{background:radial-gradient(ellipse at center,#2a0a0a 0%,#030303 70%);}
.tc{animation:tcAnim 0.3s ease;}
@keyframes ntfIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes tcAnim{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.97)}}
@keyframes ringRot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes xpShim{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes atkAnim{0%{transform:translateX(0)}30%{transform:translateX(38px) scale(1.05)}60%{transform:translateX(-4px)}100%{transform:translateX(0)}}
@keyframes hitAnim{0%{transform:translateX(0)}20%{transform:translateX(-14px)}40%{transform:translateX(7px) scale(0.95)}100%{transform:translateX(0)}}
@keyframes pflyAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}
@keyframes trophyBounce{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.2) rotate(5deg)}80%{transform:scale(0.95) rotate(-2deg)}100%{transform:scale(1) rotate(0)}}
@keyframes textReveal{from{opacity:0;transform:translateY(20px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes skullShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes confFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110px) rotate(360deg);opacity:0}}
@keyframes hexPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#ff6b0055;border-radius:2px;}
</style>
</head>
<body>
<div id="notif"></div>
<div id="modal" onclick="cModal()"><div id="mbox" onclick="event.stopPropagation()"></div></div>
<div id="bov"></div>

<header id="hdr">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:24px;filter:drop-shadow(0 0 10px #ff6b00);animation:pulse 2s infinite;">🪐</span>
    <div>
      <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:15px;letter-spacing:5px;background:linear-gradient(90deg,#ff6b00,#ffcc00,#ff4488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">MDC GAME</div>
      <div style="font-size:8px;color:#222;letter-spacing:3px;">MEME DOMINATION CLASH</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div id="hbal" style="display:none;"></div>
    <button id="wbtn" onclick="conn()" style="background:linear-gradient(135deg,#ff6b00,#cc4400);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-weight:700;font-size:9px;padding:8px 14px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 15px #ff6b0044;">CONNECT</button>
  </div>
</header>

<div id="content"></div>

<nav id="bnav">
  <button class="nb active" id="nb-arena"    onclick="go('arena')"><span class="ni">⚔️</span><span class="nl" id="nl-arena"    style="color:#ff4488;">ARENA</span></button>
  <button class="nb"        id="nb-kingdoms" onclick="go('kingdoms')"><span class="ni">🌍</span><span class="nl" id="nl-kingdoms" style="color:var(--muted)">ZONES</span></button>
  <button class="nb"        id="nb-cards"    onclick="go('cards')"><span class="ni">🃏</span><span class="nl" id="nl-cards"    style="color:var(--muted)">CARDS</span></button>
  <button class="nb"        id="nb-reiki"    onclick="go('reiki')"><span class="ni">🔮</span><span class="nl" id="nl-reiki"    style="color:var(--muted)">REIKI</span></button>
  <button class="nb"        id="nb-profile"  onclick="go('profile')"><span class="ni">👤</span><span class="nl" id="nl-profile"  style="color:var(--muted)">PROFILE</span></button>
</nav>

<script>
const TK={MDC:{n:"Mars Doge Coin",s:"MDC",e:"🪐",c:"#ff6b00",ton:"EQD0XlSVWyIxFO81-dvYf5_xIEQYv-guhKPy5We29MdN4VVE",sol:"Dxo3SrhHsLrHGc95684qY4q3h9tCzeRs5ZZoXjLGpump"},GEO:{n:"GEO",s:"GEO",e:"🌍",c:"#00d4aa",ton:"EQAOMjpg9DkDm92nTZmHMFe9hyudMo-K5B_Q0CkSjMrhXoha"},RCW_T:{n:"ReikiCoinWizard",s:"RCW",e:"🔮",c:"#cc44ff",ton:"EQBBDOdTYxa94saidJF0LNkqd-Boymd2HFhWlq-DUazD8t7p"},RCW_E:{n:"ReikiCoinWizard",s:"RCW",e:"🧙",c:"#ff44cc",eth:"0x4Aa25E0Ed382Df503C4d3fE3A82CC428bFe79FAD"}};
const M=[{n:"Gigachad",e:"💪",c:"#00ff88",bg:"#00ff8811",d:"Непобедимый"},{n:"Wojak",e:"😔",c:"#4488ff",bg:"#4488ff11",d:"Страдалец"},{n:"Pepe",e:"🐸",c:"#44ee44",bg:"#44ee4411",d:"Хитрец"},{n:"Doge",e:"🐕",c:"#ffcc00",bg:"#ffcc0011",d:"Верный"},{n:"NPC",e:"🤖",c:"#888",bg:"#88888811",d:"Скриптовый"},{n:"Sigma",e:"😎",c:"#ff4488",bg:"#ff448811",d:"Одиночка"}];
const RR=[{n:"Common",c:"#777"},{n:"Rare",c:"#4488ff"},{n:"Epic",c:"#cc44ff"},{n:"Legendary",c:"#ffaa00"}];
const ZT=[{n:"Mars Desert",e:"🏜",c:"#ff8844",i:10},{n:"Doge Valley",e:"🌿",c:"#44cc77",i:15},{n:"Pepe Swamp",e:"🐸",c:"#33bb44",i:20},{n:"Gigachad Peak",e:"⛰",c:"#ffcc00",i:25},{n:"Sigma Citadel",e:"🏰",c:"#aa44ff",i:30},{n:"Moon Base",e:"🌙",c:"#4488ff",i:40}];
let wallet=null,tab="arena";
const bal={MDC:4200,GEO:1800,RCW_T:380,RCW_E:120};
const PS={name:"FIBBIT74",level:13,xp:7840,xpNext:10000,wins:13,losses:7,rank:247,mdcEarned:2140,streak:3,avatar:"🪐",title:"Meme Warrior"};
const cards=[{id:0,m:0,r:1,lv:7,pw:65,hp:85,dk:8,wiz:false},{id:1,m:2,r:2,lv:11,pw:72,hp:60,dk:9,wiz:false},{id:2,m:3,r:0,lv:3,pw:34,hp:100,dk:5,wiz:false},{id:3,m:5,r:3,lv:15,pw:88,hp:45,dk:10,wiz:false},{id:4,m:1,r:1,lv:6,pw:48,hp:100,dk:6,wiz:false},{id:5,m:4,r:2,lv:9,pw:61,hp:30,dk:7,wiz:true}];
const op=[null,null,"Pepe","Doge",null,"Sigma",null,"Giga",null,null,"YOU",null,"Wojak",null,null,null];
const zones=Array.from({length:24},(_,i)=>({id:i,t:i%6,tier:i<3?3:i<10?2:1,owner:op[i%op.length],price:200+(i%5)*150,income:ZT[i%6].i}));
const CH=[{p:"0xPepe…6969",cards:[2,0,5],stake:50,w:12,l:5,rank:312},{p:"0xGiga…420",cards:[0,3,5],stake:100,w:8,l:3,rank:156},{p:"0xDoge…777",cards:[3,1,2],stake:25,w:20,l:10,rank:489},{p:"0xSigma…1337",cards:[5,0,2],stake:250,w:5,l:2,rank:88},{p:"0xWojak…404",cards:[1,4,3],stake:75,w:7,l:8,rank:403}];

function notif(msg,color="#00ff88"){const n=document.getElementById("notif");n.textContent=msg;n.style.display="block";n.style.border=`1px solid ${color}44`;n.style.color=color;n.style.boxShadow=`0 0 24px ${color}44`;clearTimeout(n._t);n._t=setTimeout(()=>n.style.display="none",3000);}
function cp(a){navigator.clipboard&&navigator.clipboard.writeText(a);notif("📋 Скопировано!");}
function oModal(h){document.getElementById("mbox").innerHTML=h;document.getElementById("modal").style.display="flex";}
function cModal(){document.getElementById("modal").style.display="none";}
function conn(){if(wallet)return;wallet="ok";const b=document.getElementById("wbtn");b.textContent="✓ "+PS.name;b.style.background="linear-gradient(135deg,#0a1a0a,#051205)";b.style.border="1px solid #00ff8833";b.style.color="#00ff88";b.style.boxShadow="0 0 10px #00ff8822";document.getElementById("hbal").style.display="block";document.getElementById("hbal").innerHTML=`<div style="background:#0a0a0a;border:1px solid #ff6b0033;border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">🪐</span><span style="color:#ff6b00;font-size:12px;font-weight:700;">${bal.MDC.toLocaleString()}</span></div>`;notif("✅ Кошелёк подключён! 🪐","#ff6b00");}

const NC={arena:"#ff4488",kingdoms:"#00d4aa",cards:"#4488ff",reiki:"#cc44ff",profile:"#ffcc00"};
function go(t){tab=t;Object.keys(NC).forEach(k=>{const b=document.getElementById("nb-"+k);const l=document.getElementById("nl-"+k);if(!b||!l)return;b.classList.toggle("active",k===t);l.style.color=k===t?NC[k]:"var(--muted)";b.style.borderTop=k===t?`2px solid ${NC[k]}`:"2px solid transparent";});render();document.getElementById("content").scrollTop=0;}

// ARENA
function rArena(){
  const wr=Math.round(PS.wins/(PS.wins+PS.losses)*100);
  return `<div class="tc">
    <div style="margin-bottom:20px;"><div class="gtitle" style="background:linear-gradient(90deg,#ff4488,#cc44ff,#ff6b00);">⚔ ARENA</div><div style="color:var(--muted);font-size:10px;letter-spacing:3px;font-family:'Orbitron',monospace;">MEME BATTLE GROUND</div></div>
    <div class="sgrid">
      <div class="sbox" style="border-color:#ff448822;"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;">БОЁВ</div><div style="font-size:22px;font-weight:900;color:#ff4488;font-family:'Orbitron',monospace;">247</div></div>
      <div class="sbox" style="border-color:#ffcc0022;"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;">MDC В ПУЛЕ</div><div style="font-size:22px;font-weight:900;color:#ffcc00;font-family:'Orbitron',monospace;">84K</div></div>
      <div class="sbox" style="border-color:#00ff8822;"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;">РЕЙТИНГ</div><div style="font-size:18px;font-weight:900;color:#00ff88;font-family:'Orbitron',monospace;">${PS.wins}W ${PS.losses}L</div><div style="font-size:10px;color:#00ff8888;">WIN ${wr}%</div></div>
      <div class="sbox" style="border-color:#4488ff22;"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;">🔥 STREAK</div><div style="font-size:22px;font-weight:900;color:#4488ff;font-family:'Orbitron',monospace;">${PS.streak}W</div><div style="font-size:10px;color:#4488ff88;">подряд</div></div>
    </div>
    <div class="stitle">🏆 МЕМЫ АРЕНЫ</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;">
      ${M.map(m=>`<div style="flex-shrink:0;background:${m.bg};border:1px solid ${m.c}33;border-radius:12px;padding:10px;text-align:center;min-width:60px;"><div style="font-size:24px;margin-bottom:3px;">${m.e}</div><div style="font-size:9px;color:${m.c};font-weight:700;">${m.n}</div><div style="font-size:8px;color:var(--muted);margin-top:1px;">${m.d}</div></div>`).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div class="stitle" style="margin:0;">⚔ ВЫЗОВЫ</div><button class="bs" onclick="notif('⚔ Создаём вызов...','#ff6b00')" style="background:linear-gradient(135deg,#ff4488,#cc0055);border:none;color:#fff;">+ БОЙ</button></div>
    ${CH.map((c,i)=>`
    <div class="card" onclick="oBattle(${i})" style="background:linear-gradient(135deg,#0d0d0d,#080808);padding:14px 12px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="font-size:26px;filter:drop-shadow(0 0 8px #ff448866);">⚔️</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
            <span style="color:#888;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.p}</span>
            <span style="background:#ff488811;border:1px solid #ff448833;border-radius:4px;font-size:8px;color:#ff4488;padding:1px 5px;flex-shrink:0;">#${c.rank}</span>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:4px;">${c.cards.map(ci=>`<span style="font-size:22px;filter:drop-shadow(0 0 6px ${M[ci].c});">${M[ci].e}</span>`).join("")}</div>
          <div style="color:var(--muted);font-size:10px;">${c.w}W / ${c.l}L · ${Math.round(c.w/(c.w+c.l)*100)}%</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="color:#ffcc00;font-weight:900;font-size:20px;font-family:'Orbitron',monospace;text-shadow:0 0 10px #ffcc0066;">${c.stake}</div>
          <div style="color:var(--muted);font-size:9px;margin-bottom:6px;">MDC</div>
          <div style="background:linear-gradient(135deg,#ff4488,#cc0055);border-radius:8px;color:#fff;font-size:10px;font-weight:700;padding:6px 12px;font-family:'Orbitron',monospace;box-shadow:0 0 12px #ff448844;">FIGHT</div>
        </div>
      </div>
    </div>`).join("")}
  </div>`;
}

function oBattle(i){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  const c=CH[i];
  oModal(`<div style="text-align:center;">
    <div style="font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:16px;font-family:'Orbitron',monospace;">BATTLE PREVIEW</div>
    <div style="display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:20px;">
      <div><div style="font-size:10px;color:#00ff88;margin-bottom:8px;font-family:'Orbitron',monospace;">ВЫ</div>${cards.slice(0,3).map(x=>`<div style="font-size:32px;line-height:1.4;filter:drop-shadow(0 0 8px ${M[x.m].c});">${M[x.m].e}</div>`).join("")}</div>
      <div><div style="font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff4488;text-shadow:0 0 20px #ff4488;">VS</div><div style="margin-top:8px;color:#ffcc00;font-size:14px;font-family:'Orbitron',monospace;font-weight:700;">${c.stake}<br><span style="font-size:10px;">MDC</span></div></div>
      <div><div style="font-size:10px;color:#ff4488;margin-bottom:8px;font-family:'Orbitron',monospace;">${c.p.split("…")[0]}</div>${c.cards.map(ci=>`<div style="font-size:32px;line-height:1.4;filter:drop-shadow(0 0 8px ${M[ci].c});">${M[ci].e}</div>`).join("")}</div>
    </div>
    <button class="bp" onclick="runB(${i})" style="background:linear-gradient(135deg,#ff4488,#cc0055);color:#fff;box-shadow:0 0 25px #ff448855;">⚔ НАЧАТЬ БОЙ</button>
    <button onclick="cModal()" style="display:block;width:100%;margin-top:10px;background:none;border:none;color:var(--muted);font-family:'Orbitron',monospace;font-size:10px;cursor:pointer;padding:8px;">ОТМЕНА</button>
  </div>`);
}

  const wr=Math.round(PS.wins/(PS.wins+PS.losses)*100);
  const xpPct=Math.round(PS.xp/PS.xpNext*100);
  const ach=[{e:"🏆",n:"First Blood",desc:"Первая победа",done:true},{e:"🔥",n:"On Fire",desc:"5 побед подряд",done:true},{e:"🌍",n:"Landlord",desc:"Захват 5 зон",done:true},{e:"🧙",n:"Wizard",desc:"Купи Wizard NFT",done:false},{e:"💎",n:"Diamond Hands",desc:"1000 MDC в пуле",done:false},{e:"👑",n:"King of Memes",desc:"Достигни Lv.25",done:false}];
  return `<div class="tc">
    <div style="background:linear-gradient(135deg,#0f0f0f,#080808);border:1px solid #1e1e1e;border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;">
      <div style="position:absolute;right:-10px;top:-10px;font-size:100px;opacity:0.04;">🪐</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div class="pring"><span>${PS.avatar}</span></div>
        <div>
          <div style="font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:2px;margin-bottom:4px;">${PS.name}</div>
          <div style="color:#ff6b00;font-size:11px;font-weight:700;margin-bottom:6px;">${PS.title}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="background:#ff6b0022;border:1px solid #ff6b0044;border-radius:6px;padding:3px 8px;color:#ff6b00;font-size:10px;font-family:'Orbitron',monospace;font-weight:700;">LEVEL ${PS.level}</span>
            <span style="background:#ffcc0011;border:1px solid #ffcc0033;border-radius:6px;padding:3px 8px;color:#ffcc00;font-size:10px;">🔥 ${PS.streak}W</span>
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:10px;color:var(--muted);">XP</span><span style="font-size:10px;color:#ff6b00;">${PS.xp.toLocaleString()} / ${PS.xpNext.toLocaleString()}</span></div>
      <div class="xpbar"><div class="xpfill" style="width:${xpPct}%;"></div></div>
      <div style="font-size:9px;color:var(--muted);margin-top:4px;text-align:right;">${(PS.xpNext-PS.xp).toLocaleString()} XP до Lv.${PS.level+1}</div>
    </div>
    <div class="stitle">⚔ СТАТИСТИКА</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
      ${[["ПОБЕДЫ",PS.wins,"#00ff88"],["ПОРАЖЕНИЯ",PS.losses,"#ff4444"],["WINRATE",wr+"%","#ffcc00"],["РЕЙТИНГ","#"+PS.rank,"#4488ff"],["MDC ЗАРАБОТАНО",PS.mdcEarned.toLocaleString(),"#ff6b00"],["МОИ ЗОНЫ",zones.filter(z=>z.owner==="YOU").length,"#00d4aa"]].map(([l,v,c])=>`<div class="sbox" style="border-color:${c}22;"><div style="font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;">${l}</div><div style="font-size:16px;font-weight:900;color:${c};font-family:'Orbitron',monospace;">${v}</div></div>`).join("")}
    </div>
    <div class="stitle">💎 МОИ ТОКЕНЫ</div>
    <div style="background:#0a0a0a;border:1px solid #1e1e1e;border-radius:14px;padding:14px;margin-bottom:14px;">
      ${Object.entries(TK).map(([k,t])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #111;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:20px;">${t.e}</span><div><div style="color:${t.c};font-size:12px;font-weight:700;">${t.n}</div><div style="color:var(--muted);font-size:9px;">${t.s}</div></div></div><div style="color:${t.c};font-size:16px;font-weight:700;font-family:'Orbitron',monospace;">${(bal[k]||0).toLocaleString()}</div></div>`).join("")}
    </div>
    <div class="stitle">🏆 ДОСТИЖЕНИЯ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${ach.map(a=>`<div style="background:${a.done?"linear-gradient(135deg,#0a1a0a,#080808)":"#080808"};border:1px solid ${a.done?"#00ff8833":"#1e1e1e"};border-radius:12px;padding:12px;opacity:${a.done?1:0.5};"><div style="font-size:24px;margin-bottom:5px;">${a.e}</div><div style="font-size:11px;color:${a.done?"#fff":"#555"};font-weight:700;margin-bottom:2px;">${a.n}</div><div style="font-size:9px;color:var(--muted);">${a.desc}</div><div style="font-size:9px;margin-top:4px;color:${a.done?"#00ff88":"#333"};">${a.done?"✓ ПОЛУЧЕНО":"🔒 ЗАБЛОКИРОВАНО"}</div></div>`).join("")}
    </div>
  </div>`;
}

function render(){const fns={arena:rArena,kingdoms:rKingdoms,cards:rCards,reiki:rReiki,profile:rProfile};document.getElementById("content").innerHTML=(fns[tab]||rArena)();}
document.querySelectorAll(".nb").forEach(b=>{const id=b.id.replace("nb-","");b.style.borderTop=id==="arena"?`2px solid ${NC[id]}`:"2px solid transparent";});
render();
</script>
</body>
</html>
