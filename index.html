<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Marcel Space Run 🐶🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;}
canvas{display:block;position:fixed;inset:0;}
#ui{position:fixed;inset:0;pointer-events:none;font-family:'Orbitron',monospace;}
#hud{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;display:none;}
.hbox{background:rgba(0,0,0,0.7);border-radius:12px;padding:8px 14px;backdrop-filter:blur(8px);}
#score-box{border:1px solid #ff6b0044;}
#mdc-box{border:1px solid #ffcc0044;text-align:right;}
.hlabel{font-size:8px;letter-spacing:3px;margin-bottom:2px;}
.hval{font-size:20px;font-weight:900;}
#hp-wrap{position:absolute;top:76px;left:16px;right:16px;display:none;}
#hp-label{font-size:8px;color:#ff4444aa;letter-spacing:2px;margin-bottom:4px;}
#hp-bg{height:7px;background:#111;border-radius:4px;overflow:hidden;border:1px solid #222;}
#hp-fill{height:100%;border-radius:4px;transition:width 0.3s,background 0.3s;}
#lives{position:absolute;top:96px;right:16px;display:none;gap:4px;}
#dist-label{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:2px;}
#pu-indicator{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border-radius:10px;padding:6px 16px;font-size:11px;letter-spacing:2px;border:1px solid #333;display:none;backdrop-filter:blur(8px);}
#combo-display{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;pointer-events:none;display:none;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;pointer-events:all;}
#start-screen{background:radial-gradient(ellipse at 50% 40%,#080220 0%,#000 70%);}
#go-screen{background:radial-gradient(ellipse at center,#1a0505 0%,#000 70%);display:none;}
#pause-screen{background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:none;}

.logo-text{font-size:10px;letter-spacing:6px;color:#ff6b0066;margin-bottom:10px;}
.game-title{font-family:'Orbitron',monospace;font-weight:900;font-size:28px;letter-spacing:4px;text-align:center;line-height:1.1;margin-bottom:4px;background:linear-gradient(135deg,#ff6b00,#ffcc00,#ff4488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.game-sub{font-size:11px;color:#555;letter-spacing:3px;margin-bottom:20px;text-align:center;}

#marcel-preview{width:110px;height:110px;border-radius:50%;border:3px solid #ff6b0066;margin-bottom:20px;object-fit:cover;box-shadow:0 0 30px #ff6b0044;animation:floatAnim 2.5s ease-in-out infinite;}

.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;max-width:320px;}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:#444;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:5px 8px;}
.le{font-size:14px;}

.btn{font-family:'Orbitron',monospace;font-weight:900;font-size:12px;letter-spacing:3px;border:none;border-radius:14px;padding:15px 36px;cursor:pointer;transition:all 0.2s;width:100%;max-width:280px;margin-bottom:10px;}
.btn:active{transform:scale(0.96);}
.btn-p{background:linear-gradient(135deg,#ff6b00,#cc4400);color:#fff;box-shadow:0 0 25px #ff6b0044;}
.btn-s{background:transparent;border:1px solid #222;color:#444;}

.srow{display:flex;justify-content:space-between;width:100%;max-width:280px;background:#080808;border:1px solid #151515;border-radius:12px;padding:12px 16px;margin-bottom:8px;}
.sl{color:#444;font-size:10px;letter-spacing:2px;}
.sv{font-size:13px;font-weight:700;}

@keyframes floatAnim{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes trophyPop{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes skullWobble{0%,100%{transform:rotate(0)}30%{transform:rotate(-10deg)}70%{transform:rotate(10deg)}}
@keyframes comboAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(0.6)}50%{opacity:1;transform:translate(-50%,-65%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-90%) scale(0.9)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="hud">
    <div class="hbox" id="score-box"><div class="hlabel" style="color:#ff6b0088;">SCORE</div><div class="hval" style="color:#ff6b00;" id="sv">0</div></div>
    <div class="hbox" id="mdc-box"><div class="hlabel" style="color:#ffcc0088;">MDC 🪐</div><div class="hval" style="color:#ffcc00;" id="mv">0</div></div>
  </div>
  <div id="hp-wrap">
    <div id="hp-label">HP ❤</div>
    <div id="hp-bg"><div id="hp-fill"></div></div>
  </div>
  <div id="lives" style="display:flex;position:absolute;top:96px;right:16px;"></div>
  <div id="dist-label"></div>
  <div id="pu-indicator"></div>
  <div id="combo-display"></div>
</div>

<!-- START -->
<div class="screen" id="start-screen">
  <div class="logo-text">MDC GAME PRESENTS</div>
  <div class="game-title">MARCEL<br>SPACE RUN</div>
  <div class="game-sub">🪐 MDC MARS DOGE COIN 🚀</div>
  <img id="marcel-preview" src="https://cache.tonapi.io/imgproxy/oVgb6eHoEhc2Rvqf5Mj4A8eYPZfpbbGBhwKvXWeZEtg/rs:fill:500:500:1/g:no/aHR0cHM6Ly9zLmdldGdlbXMuaW8vbmZ0L3MvNjdiNC82N2I0ODBlMzE4Y2EwY2IzMzU2OWNjNTYvbmZ0LzEzMTIxNzgud2VicA.webp" crossorigin="anonymous" alt="Marcel"/>
  <div class="legend">
    <div class="li"><span class="le">🪐</span><span>MDC монета</span></div>
    <div class="li"><span class="le">⭐</span><span>+Жизнь</span></div>
    <div class="li"><span class="le">🛡</span><span>Щит</span></div>
    <div class="li"><span class="le">⚡</span><span>Ускорение</span></div>
    <div class="li"><img src="https://assets.coingecko.com/coins/images/5/small/dogecoin.png" style="width:14px;height:14px;border-radius:50%;" onerror="this.outerHTML='🐕'"/><span>DOGE</span></div>
    <div class="li"><img src="https://assets.coingecko.com/coins/images/11939/small/shiba.png" style="width:14px;height:14px;border-radius:50%;" onerror="this.outerHTML='🐕‍🦺'"/><span>SHIB</span></div>
    <div class="li"><img src="https://assets.coingecko.com/coins/images/33566/small/dogwifhat.jpg" style="width:14px;height:14px;border-radius:50%;" onerror="this.outerHTML='🎩'"/><span>WIF</span></div>
    <div class="li"><img src="https://assets.coingecko.com/coins/images/28600/small/bonk.jpg" style="width:14px;height:14px;border-radius:50%;" onerror="this.outerHTML='🔨'"/><span>BONK</span></div>
    <div class="li"><img src="https://assets.coingecko.com/coins/images/16746/small/PNG_image.png" style="width:14px;height:14px;border-radius:50%;" onerror="this.outerHTML='⚔️'"/><span>FLOKI</span></div>
  </div>
  <button class="btn btn-p" onclick="startGame()">🚀 ЗАПУСТИТЬ</button>
  <button class="btn btn-s" onclick="alert('ТАП — прыжок\nДВОЙНОЙ ТАП — щит\nСобирай 🪐 MDC\nИзбегай собачьих монет!')">КАК ИГРАТЬ</button>
</div>

<!-- GAME OVER -->
<div class="screen" id="go-screen">
  <div style="font-size:64px;margin-bottom:10px;animation:skullWobble 0.6s ease;">💀</div>
  <div style="font-family:'Orbitron',monospace;font-weight:900;font-size:24px;color:#ff4444;letter-spacing:3px;margin-bottom:6px;">GAME OVER</div>
  <div style="font-size:10px;color:#333;letter-spacing:2px;margin-bottom:24px;">МАРСЕЛЬ ВСТРЕТИЛ МЕДВЕЖИЙ РЫНОК</div>
  <div class="srow"><span class="sl">СЧЁТ</span><span class="sv" id="go-sc" style="color:#ff6b00;">0</span></div>
  <div class="srow"><span class="sl">РЕКОРД</span><span class="sv" id="go-best" style="color:#ffcc00;">0</span></div>
  <div class="srow"><span class="sl">MDC СОБРАНО</span><span class="sv" id="go-mdc" style="color:#00ff88;">0 🪐</span></div>
  <div class="srow"><span class="sl">ДИСТАНЦИЯ</span><span class="sv" id="go-dist" style="color:#4488ff;">0 ly</span></div>
  <div style="height:14px;"></div>
  <button class="btn btn-p" onclick="startGame()">🔄 ЕЩЁ РАЗ</button>
  <button class="btn btn-s" onclick="showStart()">← МЕНЮ</button>
</div>

<!-- PAUSE -->
<div class="screen" id="pause-screen">
  <div style="font-size:11px;color:#333;letter-spacing:4px;margin-bottom:16px;font-family:'Orbitron',monospace;">ПАУЗА</div>
  <img src="https://cache.tonapi.io/imgproxy/oVgb6eHoEhc2Rvqf5Mj4A8eYPZfpbbGBhwKvXWeZEtg/rs:fill:500:500:1/g:no/aHR0cHM6Ly9zLmdldGdlbXMuaW8vbmZ0L3MvNjdiNC82N2I0ODBlMzE4Y2EwY2IzMzU2OWNjNTYvbmZ0LzEzMTIxNzgud2VicA.webp" style="width:70px;height:70px;border-radius:50%;border:2px solid #ff6b0044;margin-bottom:20px;" crossorigin="anonymous"/>
  <button class="btn btn-p" onclick="resumeGame()">▶ ПРОДОЛЖИТЬ</button>
  <button class="btn btn-s" onclick="showStart()">← МЕНЮ</button>
</div>

<script>
const C=document.getElementById("c");
const ctx=C.getContext("2d");
function resize(){C.width=window.innerWidth;C.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);

// LOAD IMAGES
const MARCEL_IMG=new Image();
MARCEL_IMG.crossOrigin="anonymous";
MARCEL_IMG.src="https://cache.tonapi.io/imgproxy/oVgb6eHoEhc2Rvqf5Mj4A8eYPZfpbbGBhwKvXWeZEtg/rs:fill:500:500:1/g:no/aHR0cHM6Ly9zLmdldGdlbXMuaW8vbmZ0L3MvNjdiNC82N2I0ODBlMzE4Y2EwY2IzMzU2OWNjNTYvbmZ0LzEzMTIxNzgud2VicA.webp";

const ENEMY_IMGS={};
const ENEMY_DEFS=[
  {key:"DOGE",url:"https://assets.coingecko.com/coins/images/5/small/dogecoin.png",dmg:20,spd:1.4,size:28,label:"DOGE",color:"#c2a633"},
  {key:"SHIB",url:"https://assets.coingecko.com/coins/images/11939/small/shiba.png",dmg:15,spd:1.2,size:26,label:"SHIB",color:"#e03c2f"},
  {key:"WIF", url:"https://assets.coingecko.com/coins/images/33566/small/dogwifhat.jpg",dmg:25,spd:2.0,size:24,label:"WIF",color:"#9b70e0"},
  {key:"BONK",url:"https://assets.coingecko.com/coins/images/28600/small/bonk.jpg",dmg:30,spd:1.6,size:30,label:"BONK",color:"#f7931a"},
  {key:"FLOKI",url:"https://assets.coingecko.com/coins/images/16746/small/PNG_image.png",dmg:35,spd:0.9,size:34,label:"FLOKI",color:"#ff5e5e"},
];
ENEMY_DEFS.forEach(e=>{
  const img=new Image();img.crossOrigin="anonymous";img.src=e.url;
  ENEMY_IMGS[e.key]=img;
});

// STATE
let state="start";
let score=0,mdc=0,dist=0,best=0,hp=100,lives=3,combo=0,comboT=0;
let shield=false,shieldT=0,boost=false,boostT=0,magnet=false,magnetT=0;
let fc=0,spd=3,diff=1,lastTap=0;
let holdTimer=null;

let m={x:0,y:0,vy:0,sz:36}; // marcel
let bgStars=[],particles=[],coins=[],enemies=[],powerups=[],explosions=[],floats=[];

function initStars(){
  bgStars=[];
  for(let i=0;i<130;i++)bgStars.push({x:Math.random()*C.width,y:Math.random()*C.height,r:Math.random()*1.5+0.2,s:Math.random()*1.5+0.3,a:Math.random()*0.7+0.2});
}

function startGame(){
  hideAll();
  document.getElementById("hud").style.display="flex";
  document.getElementById("hp-wrap").style.display="block";
  document.getElementById("lives").style.display="flex";
  score=0;mdc=0;dist=0;hp=100;lives=3;combo=0;spd=3;diff=1;fc=0;
  shield=false;boost=false;magnet=false;
  particles=[];coins=[];enemies=[];powerups=[];explosions=[];floats=[];
  m.x=C.width*0.2;m.y=C.height*0.5;m.vy=0;
  initStars();updateHUD();state="playing";
  requestAnimationFrame(loop);
}
function showStart(){hideAll();document.getElementById("start-screen").style.display="flex";state="start";}
function hideAll(){
  ["start-screen","go-screen","pause-screen"].forEach(id=>document.getElementById(id).style.display="none");
  document.getElementById("hud").style.display="none";
  document.getElementById("hp-wrap").style.display="none";
  document.getElementById("lives").style.display="none";
}
function pauseGame(){if(state!=="playing")return;state="pause";document.getElementById("pause-screen").style.display="flex";}
function resumeGame(){document.getElementById("pause-screen").style.display="none";state="playing";requestAnimationFrame(loop);}
function gameOver(){
  state="gameover";
  if(score>best)best=score;
  document.getElementById("go-sc").textContent=score;
  document.getElementById("go-best").textContent=best;
  document.getElementById("go-mdc").textContent=mdc+" 🪐";
  document.getElementById("go-dist").textContent=Math.floor(dist)+" ly";
  setTimeout(()=>{hideAll();document.getElementById("go-screen").style.display="flex";},700);
}

function updateHUD(){
  document.getElementById("sv").textContent=score;
  document.getElementById("mv").textContent=mdc;
  const hc=hp>60?"linear-gradient(90deg,#00ff88,#44ee44)":hp>30?"linear-gradient(90deg,#ffcc00,#ff8844)":"linear-gradient(90deg,#ff4444,#ff2222)";
  document.getElementById("hp-fill").style.width=hp+"%";
  document.getElementById("hp-fill").style.background=hc;
  document.getElementById("lives").innerHTML=Array.from({length:lives},()=>`<span style="font-size:16px;">❤️</span>`).join("");
  document.getElementById("dist-label").textContent=Math.floor(dist)+" LIGHT YEARS";
}

// SPAWN
function spawnCoin(){
  const y=C.height*0.12+Math.random()*C.height*0.76;
  const t=Math.random()<0.1?"big":Math.random()<0.04?"super":"norm";
  coins.push({x:C.width+20,y,r:t==="super"?18:t==="big"?14:10,t,a:0});
}
function spawnEnemy(){
  const d=ENEMY_DEFS[Math.floor(Math.random()*ENEMY_DEFS.length)];
  const y=C.height*0.1+Math.random()*C.height*0.8;
  const wave=Math.random()<0.3; // some enemies come in pairs
  enemies.push({x:C.width+40,y,vy:0,baseY:y,wAmp:30+Math.random()*60,wPhase:Math.random()*Math.PI*2,...d,spd:d.spd*diff});
  if(wave)setTimeout(()=>{if(state==="playing")enemies.push({x:C.width+90,y:y+40,vy:0,baseY:y+40,wAmp:25,wPhase:Math.random()*Math.PI*2,...d,spd:d.spd*diff});},400);
}
function spawnPU(){
  const types=[
    {e:"🛡",t:"shield",c:"#4488ff"},{e:"⚡",t:"boost",c:"#ffcc00"},
    {e:"⭐",t:"life",c:"#ff88ff"},{e:"💊",t:"heal",c:"#00ff88"},{e:"🧲",t:"magnet",c:"#ff6b00"}
  ];
  const p=types[Math.floor(Math.random()*types.length)];
  powerups.push({x:C.width+20,y:C.height*0.2+Math.random()*C.height*0.6,...p,r:18,a:0});
}

function addExplosion(x,y,color,n=12){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    explosions.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,alpha:1,color});}
}
function addFloat(x,y,txt,color="#ffcc00"){floats.push({x,y,txt,color,a:1,vy:-1.5,life:55});}
function addTrail(){particles.push({x:m.x-m.sz*0.4,y:m.y,r:3+Math.random()*3,a:0.7,vx:-(1+Math.random()*2),vy:(Math.random()-0.5)*1.5,color:boost?"#ffcc00":"#ff6b00"});}

function d2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function takeDmg(d){
  hp=Math.max(0,hp-d);
  C.style.animation="none";setTimeout(()=>C.style.animation="shakeX 0.3s ease",10);
  if(hp<=0){lives--;if(lives<=0){gameOver();}else{hp=100;shield=true;shieldT=200;}}
}
function applyPU(t,x,y){
  const col={shield:"#4488ff",boost:"#ffcc00",life:"#ff88ff",heal:"#00ff88",magnet:"#ff6b00"}[t];
  addExplosion(x,y,col,14);
  if(t==="shield"){shield=true;shieldT=300;showPUI("🛡 SHIELD","#4488ff");}
  else if(t==="boost"){boost=true;boostT=220;score+=50;showPUI("⚡ BOOST","#ffcc00");}
  else if(t==="life"){lives=Math.min(5,lives+1);addFloat(x,y,"❤ +LIFE","#ff88ff");}
  else if(t==="heal"){hp=Math.min(100,hp+35);addFloat(x,y,"+35 HP 💊","#00ff88");}
  else if(t==="magnet"){magnet=true;magnetT=280;addFloat(x,y,"🧲 MAGNET!","#ff6b00");}
}
function showPUI(txt,color){const el=document.getElementById("pu-indicator");el.textContent=txt;el.style.display="block";el.style.color=color;el.style.borderColor=color+"44";}

// DRAW HELPERS
function drawCircleImg(img,x,y,r,fallbackEmoji="🐕"){
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  if(img&&img.complete&&img.naturalWidth>0){ctx.drawImage(img,x-r,y-r,r*2,r*2);}
  else{ctx.font=`${r*1.5}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(fallbackEmoji,x,y);}
  ctx.restore();
}
function drawCircleBorder(x,y,r,color,width=2){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle=color;ctx.lineWidth=width;ctx.stroke();
}

// MAIN LOOP
let lastT=0;
function loop(ts){
  if(state!=="playing")return;
  const dt=Math.min((ts-lastT)/16,3);lastT=ts;fc++;

  // BG
  const bg=ctx.createLinearGradient(0,0,C.width,C.height);
  bg.addColorStop(0,"#020008");bg.addColorStop(0.5,"#050118");bg.addColorStop(1,"#080520");
  ctx.fillStyle=bg;ctx.fillRect(0,0,C.width,C.height);

  // NEBULA
  const nb=ctx.createRadialGradient(C.width*.7,C.height*.25,0,C.width*.7,C.height*.25,180);
  nb.addColorStop(0,"rgba(80,0,160,0.05)");nb.addColorStop(1,"transparent");
  ctx.fillStyle=nb;ctx.fillRect(0,0,C.width,C.height);

  // STARS
  const curSpd=boost?spd*2.2:spd;
  bgStars.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
    s.x-=s.s*(boost?2.5:1)*dt;if(s.x<0){s.x=C.width;s.y=Math.random()*C.height;}
  });

  // DIFFICULTY
  dist+=curSpd*dt*0.012;
  if(fc%500===0){spd=Math.min(spd+0.25,9);diff=Math.min(diff+0.08,3);}

  // SPAWN
  if(fc%Math.max(35,85-fc*0.015|0)===0)spawnCoin();
  if(fc%Math.max(75,160-fc*0.025|0)===0)spawnEnemy();
  if(fc%280===0)spawnPU();

  // TRAIL
  if(fc%3===0)addTrail();

  // PHYSICS
  m.vy+=(boost?0.2:0.42)*dt;
  m.y+=m.vy*dt;
  const top=C.height*0.05,bot=C.height*0.93;
  if(m.y<top){m.y=top;m.vy=Math.abs(m.vy)*0.3;}
  if(m.y>bot){m.y=bot;m.vy=-Math.abs(m.vy)*0.4;takeDmg(4);}

  // PARTICLES
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.a-=0.04*dt;p.r*=0.97;});
  particles=particles.filter(p=>p.a>0);
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color===`#ffcc00`?`rgba(255,204,0,${p.a})`:`rgba(255,107,0,${p.a})`;ctx.fill();
  });

  // COINS
  coins.forEach(c=>{
    c.x-=curSpd*dt;c.a+=0.05;
    if(magnet&&d2(c,m)<170){c.x+=(m.x-c.x)*0.12;c.y+=(m.y-c.y)*0.12;}
    // glow
    const gr=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r+8);
    gr.addColorStop(0,c.t==="super"?"rgba(255,100,0,0.35)":c.t==="big"?"rgba(255,200,0,0.25)":"rgba(255,200,0,0.15)");
    gr.addColorStop(1,"transparent");
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(c.x,c.y,c.r+8,0,Math.PI*2);ctx.fill();
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.a);
    ctx.font=`${c.r*2.2}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🪐",0,0);
    ctx.restore();
    if(d2(c,m)<(c.r+m.sz*0.75)){
      const v=c.t==="super"?5:c.t==="big"?3:1;
      mdc+=v;score+=v*10*(combo>3?2:1);combo++;comboT=80;
      addExplosion(c.x,c.y,"#ffcc00",6);addFloat(c.x,c.y,`+${v}🪐`,"#ffcc00");
      if(combo>4)addFloat(c.x,c.y-28,`x${combo}!`,"#ff4488");
      c.x=-999;
    }
  });
  coins=coins.filter(c=>c.x>-50);

  // ENEMIES
  enemies.forEach(e=>{
    e.x-=(curSpd+e.spd)*dt;
    e.y=e.baseY+Math.sin(fc*0.035+e.wPhase)*e.wAmp;
    const img=ENEMY_IMGS[e.key];
    // glow ring
    ctx.beginPath();ctx.arc(e.x,e.y,e.size+5,0,Math.PI*2);
    ctx.fillStyle=e.color+"18";ctx.fill();
    drawCircleImg(img,e.x,e.y,e.size,"🐕");
    drawCircleBorder(e.x,e.y,e.size,e.color+"88",2);
    // label
    ctx.font="bold 8px 'Orbitron',monospace";ctx.fillStyle=e.color+"cc";
    ctx.textAlign="center";ctx.fillText(e.label,e.x,e.y+e.size+10);

    if(d2(e,m)<(e.size+m.sz*0.65)){
      if(shield){shield=false;shieldT=0;addExplosion(e.x,e.y,"#4488ff",16);addFloat(e.x,e.y,"SHIELD! 🛡","#4488ff");document.getElementById("pu-indicator").style.display="none";}
      else{takeDmg(e.dmg);addExplosion(e.x,e.y,"#ff4444",12);addFloat(e.x,e.y,`-${e.dmg}HP`,"#ff4444");}
      combo=0;e.x=-999;
    }
  });
  enemies=enemies.filter(e=>e.x>-80);

  // POWERUPS
  powerups.forEach(p=>{
    p.x-=curSpd*dt;p.a+=0.04;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r+6,0,Math.PI*2);
    ctx.fillStyle=p.c+"22";ctx.fill();
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.sin(p.a)*0.2);
    ctx.font="28px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(p.e,0,0);
    ctx.restore();
    if(d2(p,m)<(p.r+m.sz*0.8)){applyPU(p.t,p.x,p.y);p.x=-999;}
  });
  powerups=powerups.filter(p=>p.x>-50);

  // EXPLOSIONS
  explosions.forEach(e=>{e.x+=e.vx*dt;e.y+=e.vy*dt;e.alpha-=0.03*dt;e.vx*=0.95;e.vy*=0.95;});
  explosions=explosions.filter(e=>e.alpha>0);
  explosions.forEach(e=>{
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fillStyle=e.color+Math.floor(e.alpha*255).toString(16).padStart(2,"0");ctx.fill();
  });

  // FLOAT TEXTS
  floats.forEach(f=>{f.y+=f.vy*dt;f.a-=0.018*dt;});
  floats=floats.filter(f=>f.a>0);
  floats.forEach(f=>{
    ctx.font="bold 13px 'Orbitron',monospace";ctx.textAlign="center";
    ctx.fillStyle=f.color+Math.floor(f.a*255).toString(16).padStart(2,"0");
    ctx.fillText(f.txt,f.x,f.y);
  });

  // TIMERS
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}
  if(shieldT>0){shieldT-=dt;if(shieldT<=0){shield=false;document.getElementById("pu-indicator").style.display="none";}}
  if(boostT>0){boostT-=dt;if(boostT<=0){boost=false;document.getElementById("pu-indicator").style.display="none";}}
  if(magnetT>0){magnetT-=dt;if(magnetT<=0)magnet=false;}

  // DRAW MARCEL
  ctx.save();
  ctx.translate(m.x,m.y);
  const tilt=Math.max(-0.35,Math.min(0.35,m.vy*0.035));
  ctx.rotate(tilt);

  if(shield){
    ctx.beginPath();ctx.arc(0,0,m.sz+10,0,Math.PI*2);
    ctx.fillStyle=`rgba(68,136,255,${0.12+Math.sin(fc*0.12)*0.06})`;ctx.fill();
    ctx.strokeStyle=`rgba(68,136,255,${0.5+Math.sin(fc*0.1)*0.2})`;ctx.lineWidth=2;ctx.stroke();
  }
  if(boost){
    const bg2=ctx.createRadialGradient(-22,0,0,-22,0,32);
    bg2.addColorStop(0,"rgba(255,204,0,0.4)");bg2.addColorStop(1,"transparent");
    ctx.fillStyle=bg2;ctx.beginPath();ctx.ellipse(-22,0,36,14,0,0,Math.PI*2);ctx.fill();
  }

  // draw marcel image in circle
  ctx.beginPath();ctx.arc(0,0,m.sz,0,Math.PI*2);ctx.clip();
  if(MARCEL_IMG.complete&&MARCEL_IMG.naturalWidth>0){
    ctx.drawImage(MARCEL_IMG,-m.sz,-m.sz,m.sz*2,m.sz*2);
  } else {
    ctx.font=`${m.sz*1.8}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🐶",0,0);
  }
  ctx.restore();

  // MARCEL BORDER
  if(shield){drawCircleBorder(m.x,m.y,m.sz+10,`rgba(68,136,255,${0.5+Math.sin(fc*0.1)*0.2})`,2);}
  else{drawCircleBorder(m.x,m.y,m.sz,"rgba(255,107,0,0.4)",1.5);}

  // COMBO
  if(combo>2){
    ctx.font=`bold ${Math.min(16+combo,24)}px 'Orbitron',monospace`;
    ctx.fillStyle=`rgba(255,68,136,${0.7+Math.sin(fc*0.2)*0.2})`;
    ctx.textAlign="center";ctx.fillText(`${combo}x COMBO!`,C.width/2,C.height*0.14);
  }

  // SCORE
  score+=Math.floor(curSpd*dt*0.4);
  updateHUD();

  requestAnimationFrame(loop);
}

// INPUT
function jump(){
  if(state!=="playing")return;
  const now=Date.now();
  if(now-lastTap<280&&shield){addFloat(m.x,m.y,"🛡","#4488ff");}
  lastTap=now;
  m.vy=-8.5;
  addExplosion(m.x+10,m.y+8,"#ff6b00",4);
}

C.addEventListener("touchstart",e=>{
  e.preventDefault();jump();
  holdTimer=setTimeout(()=>{if(state==="playing")pauseGame();},900);
},{passive:false});
C.addEventListener("touchend",()=>clearTimeout(holdTimer),{passive:false});
C.addEventListener("click",()=>{if(state==="playing")jump();});
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();if(state==="playing")jump();else if(state==="start")startGame();}
  if(e.code==="Escape"){if(state==="playing")pauseGame();else if(state==="pause")resumeGame();}
});
</script>
</body>
</html>
