<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MDC GAME</title>
<style>
:root {
  --mdc:#ff6b00; --geo:#00d4aa; --rcwt:#cc44ff; --rcwe:#ff44cc;
  --bg:#030303; --bg2:#0a0a0a; --line:#181818; --muted:#555;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg);
  color:#fff;
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER — фиксированный сверху */
#hdr {
  flex-shrink:0;
  height:56px;
  background:#050505;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  position:sticky;
  top:0;
  z-index:100;
}

/* КОНТЕНТ — скроллится */
#content {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px 14px 16px;
}

/* НИЖНЯЯ НАВИГАЦИЯ */
#bnav {
  flex-shrink:0;
  height:60px;
  background:#050505;
  border-top:1px solid var(--line);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom, 0px);
}

.nb {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  background:none;
  border:none;
  cursor:pointer;
  padding:6px 2px;
}
.nb:active { opacity:0.7; }
.ni { font-size:22px; line-height:1; }
.nl { font-size:15px; font-weight:700; letter-spacing:1px; }

/* КАРТОЧКИ */
.card {
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}
.card:active { opacity:0.85; transform:scale(0.99); }

.sgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.sbox { background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:12px 10px; text-align:center; }

.hpbg { height:5px; background:#1a1a1a; border-radius:3px; overflow:hidden; }
.hpfill { height:100%; border-radius:3px; }

.btn-p {
  width:100%; padding:13px; border:none; border-radius:12px;
  font-family:monospace; font-weight:900; font-size:14px;
  letter-spacing:2px; cursor:pointer;
}
.btn-p:active { opacity:0.85; }

.btn-s {
  padding:7px 12px; border-radius:8px;
  font-family:monospace; font-weight:700; font-size:14px; cursor:pointer;
}
.btn-s:active { opacity:0.8; }

.gtitle {
  font-size:26px; font-weight:900; letter-spacing:4px;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1.1; margin-bottom:4px;
}
.stitle { font-size:15px; color:var(--muted); letter-spacing:3px; margin-bottom:10px; }

#notif {
  position:fixed; top:65px; left:12px; right:12px; z-index:9999;
  background:#111; border-radius:12px; padding:12px 16px;
  font-weight:700; font-size:13px; text-align:center; display:none;
  animation:sdown 0.3s ease;
}

/* MODAL как bottom sheet */
#modal {
  position:fixed; inset:0; z-index:9000;
  background:#000000dd;
  display:none;
  flex-direction:column;
  justify-content:flex-end;
}
#mbox {
  background:#0f0f0f;
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--line);
  padding:20px 18px 34px;
  max-height:80vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  animation:sup 0.3s ease;
}

.arow { cursor:pointer; transition:opacity 0.1s; }
.arow:active { opacity:0.7; }

@keyframes sdown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes sup   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadein { from{opacity:0} to{opacity:1} }
.tc { animation:fadein 0.2s ease; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
</style>
</head>
<body>

<div id="notif"></div>
<div id="modal" onclick="cModal()">
  <div id="mbox" onclick="event.stopPropagation()"></div>
</div>

<!-- HEADER -->
<header id="hdr">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:22px;filter:drop-shadow(0 0 8px #ff6b00)">🪐</span>
    <div>
      <div style="font-weight:900;font-size:16px;letter-spacing:4px;
        background:linear-gradient(90deg,#ff6b00,#ffcc00,#ff4488);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;">MDC GAME</div>
      <div style="font-size:10px;color:#333;letter-spacing:2px;">MEME DOMINATION CLASH</div>
    </div>
  </div>
  <button id="wbtn" onclick="conn()" style="
    background:linear-gradient(135deg,#ff6b00,#cc4400);
    border:1px solid #ff6b00;border-radius:8px;color:#fff;
    font-family:monospace;font-weight:900;font-size:14px;
    padding:8px 14px;cursor:pointer;">CONNECT</button>
</header>

<!-- КОНТЕНТ -->
<div id="content"></div>

<!-- НИЖНЯЯ НАВИГАЦИЯ -->
<nav id="bnav">
  <button class="nb" id="nb-arena"    onclick="go('arena')">
    <span class="ni">⚔️</span>
    <span class="nl" id="nl-arena" style="color:#ff4488">ARENA</span>
  </button>
  <button class="nb" id="nb-kingdoms" onclick="go('kingdoms')">
    <span class="ni">🌍</span>
    <span class="nl" id="nl-kingdoms" style="color:var(--muted)">ZONES</span>
  </button>
  <button class="nb" id="nb-cards" onclick="go('cards')">
    <span class="ni">🃏</span>
    <span class="nl" id="nl-cards" style="color:var(--muted)">CARDS</span>
  </button>
  <button class="nb" id="nb-reiki" onclick="go('reiki')">
    <span class="ni">🔮</span>
    <span class="nl" id="nl-reiki" style="color:var(--muted)">REIKI</span>
  </button>
  <button class="nb" id="nb-tokens" onclick="go('tokens')">
    <span class="ni">💎</span>
    <span class="nl" id="nl-tokens" style="color:var(--muted)">TOKENS</span>
  </button>
</nav>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const TK = {
  MDC:   {n:"Mars Doge Coin",  s:"MDC",e:"🪐",c:"#ff6b00",role:"Основная валюта боёв",
           ton:"EQD0XlSVWyIxFO81-dvYf5_xIEQYv-guhKPy5We29MdN4VVE",
           sol:"Dxo3SrhHsLrHGc95684qY4q3h9tCzeRs5ZZoXjLGpump"},
  GEO:   {n:"GEO",             s:"GEO",e:"🌍",c:"#00d4aa",role:"Захват территорий",
           ton:"EQAOMjpg9DkDm92nTZmHMFe9hyudMo-K5B_Q0CkSjMrhXoha"},
  RCW_T: {n:"ReikiCoinWizard", s:"RCW",e:"🔮",c:"#cc44ff",role:"Повседневная магия (TON)",
           ton:"EQBBDOdTYxa94saidJF0LNkqd-Boymd2HFhWlq-DUazD8t7p"},
  RCW_E: {n:"ReikiCoinWizard", s:"RCW",e:"🧙",c:"#ff44cc",role:"Премиум магия (ETH)",
           eth:"0x4Aa25E0Ed382Df503C4d3fE3A82CC428bFe79FAD"},
};
const MM=[{n:"Gigachad",e:"💪",c:"#00ff88"},{n:"Wojak",e:"😔",c:"#4488ff"},
  {n:"Pepe",e:"🐸",c:"#44ee44"},{n:"Doge",e:"🐕",c:"#ffcc00"},
  {n:"NPC",e:"🤖",c:"#888"},{n:"Sigma",e:"😎",c:"#ff4488"}];
const RR=[{n:"Common",c:"#666"},{n:"Rare",c:"#4488ff"},{n:"Epic",c:"#cc44ff"},{n:"Legendary",c:"#ffaa00"}];
const ZZ=[{n:"Mars Desert",e:"🏜",c:"#ff8844",i:10},{n:"Doge Valley",e:"🌿",c:"#44cc77",i:15},
  {n:"Pepe Swamp",e:"🐸",c:"#33bb44",i:20},{n:"Gigachad Peak",e:"⛰",c:"#ffcc00",i:25},
  {n:"Sigma Citadel",e:"🏰",c:"#aa44ff",i:30},{n:"Moon Base",e:"🌙",c:"#4488ff",i:40}];

let wallet=null, tab="arena";
const bal={MDC:4200,GEO:1800,RCW_T:380,RCW_E:120};
const cards=[{id:0,m:0,r:1,lv:7,pw:65,hp:85,wiz:false},
  {id:1,m:2,r:2,lv:11,pw:72,hp:60,wiz:false},
  {id:2,m:3,r:0,lv:3,pw:34,hp:100,wiz:false},
  {id:3,m:5,r:3,lv:15,pw:88,hp:45,wiz:false},
  {id:4,m:1,r:1,lv:6,pw:48,hp:100,wiz:false},
  {id:5,m:4,r:2,lv:9,pw:61,hp:30,wiz:true}];
const op=[null,null,"Pepe","Doge",null,"Sigma",null,"Giga",null,null,"YOU",null];
const zones=Array.from({length:20},(_,i)=>({id:i,t:i%6,tier:i<2?3:i<8?2:1,
  owner:op[i%op.length],price:200+(i%5)*150,income:ZZ[i%6].i}));
const challengers=[{p:"0xPepe…6969",cards:[2,0,5],stake:50,w:12,l:5},
  {p:"0xGiga…420",cards:[0,3,5],stake:100,w:8,l:3},
  {p:"0xDoge…777",cards:[3,1,2],stake:25,w:20,l:10},
  {p:"0xSigma…1337",cards:[5,0,2],stake:250,w:5,l:2},
  {p:"0xWojak…404",cards:[1,4,3],stake:75,w:7,l:8}];

// ── UTILS ─────────────────────────────────────────────────────────────
function notif(msg,color){
  color=color||"#00ff88";
  var n=document.getElementById("notif");
  n.textContent=msg; n.style.display="block";
  n.style.border="1px solid "+color;
  n.style.color=color;
  n.style.boxShadow="0 0 20px "+color+"44";
  clearTimeout(n._t);
  n._t=setTimeout(function(){n.style.display="none"},3000);
}
function cpA(a){try{navigator.clipboard.writeText(a)}catch(e){}notif("📋 Скопировано!");}
function oModal(h){
  document.getElementById("mbox").innerHTML=h;
  document.getElementById("modal").style.display="flex";
}
function cModal(){document.getElementById("modal").style.display="none";}

function conn(){
  if(wallet)return;
  wallet="Connected";
  var b=document.getElementById("wbtn");
  b.textContent="✓ Connected";
  b.style.background="linear-gradient(135deg,#0a1a0a,#051205)";
  b.style.border="1px solid #00ff8844";
  b.style.color="#00ff88";
  notif("✅ Кошелёк подключён! 🪐","#ff6b00");
}

var NAV_COLORS={arena:"#ff4488",kingdoms:"#00d4aa",cards:"#4488ff",reiki:"#cc44ff",tokens:"#ffcc00"};

function go(t){
  tab=t;
  Object.keys(NAV_COLORS).forEach(function(k){
    var el=document.getElementById("nl-"+k);
    if(el) el.style.color = k===t ? NAV_COLORS[k] : "var(--muted)";
  });
  render();
  document.getElementById("content").scrollTop=0;
}

// ── ARENA ─────────────────────────────────────────────────────────────
function rArena(){
  var rows=challengers.map(function(c,i){
    return '<div class="card arow" onclick="oBattle('+i+')" style="display:flex;align-items:center;gap:12px;padding:12px 14px;">'+
      '<div style="font-size:22px;">⚔️</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="color:#777;font-size:14px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+c.p+'</div>'+
        '<div style="display:flex;gap:6px;margin-bottom:3px;">'+c.cards.map(function(ci){return '<span style="font-size:20px;">'+MM[ci].e+'</span>';}).join("")+'</div>'+
        '<div style="color:var(--muted);font-size:15px;">'+c.w+'W / '+c.l+'L</div>'+
      '</div>'+
      '<div style="text-align:right;flex-shrink:0;">'+
        '<div style="color:#ffcc00;font-weight:900;font-size:18px;">'+c.stake+'</div>'+
        '<div style="color:var(--muted);font-size:15px;margin-bottom:5px;">MDC</div>'+
        '<div style="background:linear-gradient(135deg,#330011,#550022);border:1px solid #ff448844;'+
          'border-radius:6px;color:#ff4488;font-size:13px;font-weight:700;padding:4px 10px;">FIGHT</div>'+
      '</div>'+
    '</div>';
  }).join("");

  return '<div class="tc">'+
    '<div style="margin-bottom:18px;">'+
      '<div class="gtitle" style="background:linear-gradient(90deg,#ff4488,#cc44ff,#ff6b00);">BATTLE ARENA</div>'+
      '<div style="color:var(--muted);font-size:13px;letter-spacing:2px;">СТАВКИ MDC · ЛЕЧЕНИЕ RCW</div>'+
    '</div>'+
    '<div class="sgrid">'+
      ['БОЁВ|247|#ff4488','В ПУЛЕ|84,420 MDC|#ffcc00','РЕЙТИНГ|13W 7L|#00ff88','ЗАРАБОТАНО|2,140 MDC|#4488ff'].map(function(s){
        var p=s.split("|");
        return '<div class="sbox"><div style="font-size:14px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;">'+p[0]+'</div>'+
          '<div style="font-size:16px;font-weight:900;color:'+p[2]+';text-shadow:0 0 10px '+p[2]+'55;">'+p[1]+'</div></div>';
      }).join("")+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
      '<div class="stitle" style="margin:0;">⚔ ВЫЗОВЫ</div>'+
      '<button class="btn-s" onclick="notif(\'⚔ Создаём вызов...\',\'#ff6b00\')" style="'+
        'background:linear-gradient(135deg,#ff4488,#cc0055);border:none;color:#fff;">+ БОЙ</button>'+
    '</div>'+
    rows+
  '</div>';
}

function oBattle(i){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  var c=challengers[i];
  oModal(
    '<div style="text-align:center;">'+
    '<div style="font-size:36px;margin-bottom:12px;">⚔️</div>'+
    '<div style="font-size:18px;font-weight:900;color:#ff4488;letter-spacing:3px;margin-bottom:6px;">БОЙ</div>'+
    '<div style="color:#999;font-size:14px;margin-bottom:18px;">vs '+c.p+'</div>'+
    '<div style="display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:18px;">'+
      '<div>'+cards.slice(0,3).map(function(x){return '<div style="font-size:28px;">'+MM[x.m].e+'</div>';}).join("")+'</div>'+
      '<div style="color:#ff4488;font-size:20px;font-weight:900;">VS</div>'+
      '<div>'+c.cards.map(function(ci){return '<div style="font-size:28px;">'+MM[ci].e+'</div>';}).join("")+'</div>'+
    '</div>'+
    '<div style="color:#ffcc00;margin-bottom:20px;">Ставка: '+c.stake+' MDC</div>'+
    '<button class="btn-p" onclick="runBattle('+i+')" style="background:linear-gradient(135deg,#ff4488,#cc0055);color:#fff;">⚔ НАЧАТЬ БОЙ</button>'+
    '<button onclick="cModal()" style="display:block;width:100%;margin-top:10px;background:none;border:none;'+
      'color:var(--muted);font-family:monospace;font-size:15px;cursor:pointer;padding:8px;">ОТМЕНА</button>'+
    '</div>'
  );
}

function runBattle(i){
  var c=challengers[i],won=Math.random()>0.45,mw=won?2:1;
  var rds=[0,1,2].map(function(j){return {me:MM[cards[j].m].e,en:MM[c.cards[j]].e};});
  oModal(
    '<div>'+
    '<div style="font-size:13px;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:16px;">РЕЗУЛЬТАТЫ</div>'+
    rds.map(function(r,j){
      return '<div style="display:flex;justify-content:space-between;align-items:center;'+
        'padding:10px 12px;margin-bottom:8px;border-radius:10px;'+
        'background:'+(j<mw?"#0a1a0a":"#1a0a0a")+';border:1px solid '+(j<mw?"#00ff8833":"#ff444433")+';">'+
        '<span style="font-size:24px;">'+r.me+'</span>'+
        '<div style="text-align:center;"><div style="font-size:15px;color:var(--muted);">Раунд '+(j+1)+'</div>'+
          '<div style="color:'+(j<mw?"#00ff88":"#ff4444")+';font-weight:900;">'+(j<mw?"WIN":"LOSS")+'</div></div>'+
        '<span style="font-size:24px;">'+r.en+'</span></div>';
    }).join("")+
    '<div style="margin-top:14px;padding:16px;border-radius:14px;text-align:center;'+
      'background:'+(won?"linear-gradient(135deg,#0a2a0a,#051505)":"linear-gradient(135deg,#2a0a0a,#150505)")+';'+
      'border:1px solid '+(won?"#00ff8844":"#ff444444")+';">'+
      '<div style="font-size:36px;margin-bottom:8px;">'+(won?"🏆":"💀")+'</div>'+
      '<div style="font-size:20px;font-weight:900;color:'+(won?"#00ff88":"#ff4444")+';">'+(won?"ПОБЕДА!":"ПОРАЖЕНИЕ")+'</div>'+
      '<div style="margin-top:6px;color:'+(won?"#00aa55":"#aa0000")+';font-size:15px;">'+
        (won?"+"+Math.floor(c.stake*1.9)+" MDC":"-"+c.stake+" MDC")+'</div>'+
      (!won?'<div style="color:#cc44ff;font-size:14px;margin-top:8px;">💊 Лечи карты за RCW TON!</div>':'')+
    '</div>'+
    '<button class="btn-p" onclick="cModal()" style="margin-top:14px;'+
      'background:'+(won?"linear-gradient(135deg,#00ff88,#00aa55)":"#1a1a1a")+';'+
      'color:'+(won?"#000":"#fff")+';">ЗАКРЫТЬ</button>'+
    '</div>'
  );
}

// ── KINGDOMS ──────────────────────────────────────────────────────────
function rKingdoms(){
  var mz=zones.filter(function(z){return z.owner==="YOU";});
  var zoneCards=zones.slice(0,16).map(function(z){
    var zt=ZZ[z.t],isMe=z.owner==="YOU";
    var tc=["","#555","#4488ff","#ffaa00"][z.tier];
    var tn=["","Common","Rare","Legendary"][z.tier];
    return '<div onclick="capZ('+z.id+','+z.price+',\''+( z.owner||"")+'\',\''+zt.n+'\')" style="'+
      'background:'+(isMe?zt.c+"11":"var(--bg2)")+';'+
      'border:1px solid '+(isMe?zt.c+"44":"var(--line)")+';'+
      'border-radius:12px;padding:12px;cursor:pointer;">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:5px;">'+
        '<span style="font-size:15px;color:'+tc+';font-weight:700;">'+tn+'</span>'+
        '<span style="font-size:20px;">'+zt.e+'</span>'+
      '</div>'+
      '<div style="font-size:14px;color:'+zt.c+';font-weight:700;margin-bottom:2px;">'+zt.n+'</div>'+
      '<div style="font-size:13px;color:#ff6b00;font-weight:700;margin-bottom:3px;">+'+z.income+' MDC/день</div>'+
      '<div style="font-size:15px;color:'+(isMe?"#00ff88":"var(--muted)")+';margin-bottom:4px;">'+
        (isMe?"✓ ВАША":(z.owner||"✦ FREE"))+
      '</div>'+
      '<div style="font-size:13px;color:#00d4aa;font-weight:700;">'+z.price+' GEO</div>'+
    '</div>';
  }).join("");

  return '<div class="tc">'+
    '<div style="margin-bottom:18px;">'+
      '<div class="gtitle" style="background:linear-gradient(90deg,#00d4aa,#4488ff);">KINGDOMS</div>'+
      '<div style="color:var(--muted);font-size:13px;letter-spacing:2px;">GEO → ЗОНЫ → MDC ПАССИВНО</div>'+
    '</div>'+
    '<div class="sgrid">'+
      [['МОИ ЗОНЫ',mz.length+"/20","#00d4aa"],['MDC/ДЕНЬ',"60","#ff6b00"],
       ['СВОБОДНЫХ',zones.filter(function(z){return !z.owner;}).length,"#ffcc00"],['GEO',bal.GEO,"#00d4aa"]].map(function(s){
        return '<div class="sbox"><div style="font-size:14px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;">'+s[0]+'</div>'+
          '<div style="font-size:18px;font-weight:900;color:'+s[2]+';text-shadow:0 0 10px '+s[2]+'55;">'+s[1]+'</div></div>';
      }).join("")+
    '</div>'+
    '<div style="background:linear-gradient(135deg,#0a1a0a,#051005);border:1px solid #00ff8833;'+
      'border-radius:12px;padding:14px;margin-bottom:14px;'+
      'display:flex;justify-content:space-between;align-items:center;">'+
      '<div><div style="color:#00ff88;font-weight:900;font-size:18px;">24.7 MDC</div>'+
        '<div style="color:var(--muted);font-size:13px;">готово к получению</div></div>'+
      '<button class="btn-s" onclick="notif(\'✅ 24.7 MDC получено! 🪐\',\'#00ff88\')" style="'+
        'background:linear-gradient(135deg,#00ff88,#00aa55);border:none;color:#000;font-weight:900;">CLAIM</button>'+
    '</div>'+
    '<div class="stitle">ЗОНЫ КАРТЫ</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+zoneCards+'</div>'+
  '</div>';
}
function capZ(id,price,owner,name){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  if(!owner) notif("🌍 "+name+" захвачена! -"+price+" GEO","#00d4aa");
  else notif("⚔ Атака "+name+"! -"+Math.floor(price*1.5)+" GEO","#ff4488");
}

// ── CARDS ─────────────────────────────────────────────────────────────
function rCards(){
  var cardHtml=cards.map(function(c){
    var mt=MM[c.m],r=RR[c.r];
    var hc=c.hp>60?"#00ff88":c.hp>30?"#ffcc00":"#ff4444";
    var ep=Math.floor(c.pw*(c.hp/100));
    return '<div style="background:'+(c.wiz?"linear-gradient(135deg,#1a0033,#080808)":"var(--bg2)")+';'+
      'border:2px solid '+(c.wiz?"#ff44cc":r.c+"55")+';border-radius:14px;padding:14px;margin-bottom:10px;'+
      'box-shadow:'+(c.wiz?"0 0 20px #ff44cc33":"none")+';'+
      'display:flex;align-items:center;gap:12px;position:relative;">'+
      (c.wiz?'<div style="position:absolute;top:8px;right:8px;background:#ff44cc;border-radius:4px;font-size:14px;color:#fff;padding:2px 6px;font-weight:900;">WIZARD</div>':'')+
      '<div style="text-align:center;flex-shrink:0;">'+
        '<div style="font-size:40px;line-height:1;">'+mt.e+'</div>'+
        '<div style="font-size:14px;color:'+r.c+';font-weight:700;margin-top:3px;">'+r.n.toUpperCase()+'</div>'+
      '</div>'+
      '<div style="flex:1;min-width:0;">'+
        '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'+
          '<span style="color:'+mt.c+';font-weight:700;font-size:13px;">'+mt.n+'</span>'+
          '<span style="color:var(--muted);font-size:13px;">Lv.'+c.lv+'</span>'+
        '</div>'+
        '<div style="display:flex;gap:12px;margin-bottom:5px;">'+
          '<span style="font-size:13px;color:#fff;font-weight:700;">⚔ '+ep+'</span>'+
          '<span style="font-size:13px;color:var(--muted);">HP:<span style="color:'+hc+'"> '+c.hp+'%</span></span>'+
        '</div>'+
        '<div class="hpbg" style="margin-bottom:8px;">'+
          '<div class="hpfill" style="width:'+c.hp+'%;background:'+hc+';box-shadow:0 0 6px '+hc+';"></div>'+
        '</div>'+
        '<div style="display:flex;gap:6px;">'+
          (c.hp<100?'<button class="btn-s" onclick="healC('+c.id+')" style="'+
            'background:linear-gradient(135deg,#1a0033,#0a0011);'+
            'border:1px solid #cc44ff44;color:#cc44ff;flex:1;font-size:13px;line-height:1.4;">'+
            '🔮 HEAL<br><span style="font-size:14px;color:#9933cc;">5 RCW TON</span></button>':'')+
          '<button class="btn-s" onclick="boostC('+c.id+')" style="'+
            'background:linear-gradient(135deg,#33001a,#1a000d);'+
            'border:1px solid #ff44cc44;color:#ff44cc;flex:1;font-size:13px;line-height:1.4;">'+
            '💥 BLAST<br><span style="font-size:14px;color:#cc0077;">200 RCW ETH</span></button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");

  var mintHtml=[{e:"🟣",l:"Epic Card",cost:"100 RCW",c:"#cc44ff"},
    {e:"🟡",l:"Legendary",cost:"500 RCW",c:"#ffaa00"},
    {e:"🧙",l:"Wizard Card",cost:"1000 RCW",c:"#ff44cc"}].map(function(m){
    return '<div class="card arow" onclick="mintC(\''+m.l+'\',\''+m.cost+'\')" style="display:flex;align-items:center;gap:12px;padding:12px;border-color:'+m.c+'22;">'+
      '<span style="font-size:26px;">'+m.e+'</span>'+
      '<div style="flex:1;"><div style="color:#ccc;font-size:13px;font-weight:700;">'+m.l+'</div>'+
        '<div style="color:'+m.c+';font-size:14px;margin-top:2px;">'+m.cost+'</div></div>'+
      '<div style="color:'+m.c+';font-size:18px;">→</div></div>';
  }).join("");

  return '<div class="tc">'+
    '<div style="margin-bottom:18px;">'+
      '<div class="gtitle" style="background:linear-gradient(90deg,#4488ff,#cc44ff);">МОИ КАРТЫ</div>'+
      '<div style="color:var(--muted);font-size:13px;letter-spacing:2px;">HEAL RCW TON · BLAST RCW ETH</div>'+
    '</div>'+
    cardHtml+
    '<div class="stitle" style="margin-top:6px;">🃏 МИНТ</div>'+
    mintHtml+
  '</div>';
}
function healC(id){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  cards[id].hp=Math.min(100,cards[id].hp+20);
  notif("💊 "+MM[cards[id].m].n+" исцелена! -5 RCW (TON)","#cc44ff");
  render();
}
function boostC(id){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  notif("💥 "+MM[cards[id].m].n+" Reiki Blast +100%! -200 RCW","#ff44cc");
}
function mintC(l,cost){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  notif("🃏 "+l+" заминтована! "+cost,"#4488ff");
}

// ── REIKI ─────────────────────────────────────────────────────────────
function rcwBlock(e,label,tier,tc,balance,boost,acts){
  var actHtml=acts.map(function(a){
    return '<div class="arow" onclick="rcwA(\''+a.l+'\',\''+a.s+'\','+a.c+',\''+label+'\',\''+tc+'\')" style="'+
      'display:flex;justify-content:space-between;align-items:center;'+
      'padding:11px 12px;background:'+tc+'0a;border:1px solid '+tc+'22;'+
      'border-radius:10px;margin-bottom:7px;">'+
      '<div><div style="color:'+tc+';font-size:15px;font-weight:700;">'+a.l+'</div>'+
        '<div style="color:var(--muted);font-size:13px;">'+a.s+'</div></div>'+
      '<div style="background:'+tc+'22;border:1px solid '+tc+'33;border-radius:6px;'+
        'padding:4px 10px;color:'+tc+';font-weight:900;font-size:15px;">'+a.c+' RCW</div>'+
    '</div>';
  }).join("");
  return '<div style="background:linear-gradient(135deg,'+tc+'08,var(--bg2));'+
    'border:1px solid '+tc+'44;border-radius:16px;padding:16px;margin-bottom:12px;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'+
      '<div style="display:flex;align-items:center;gap:8px;">'+
        '<span style="font-size:24px;">'+e+'</span>'+
        '<div>'+
          '<div style="display:flex;align-items:center;gap:6px;">'+
            '<span style="color:'+tc+';font-weight:700;font-size:14px;">'+label+'</span>'+
            '<span style="background:'+tc+'22;border:1px solid '+tc+';border-radius:4px;'+
              'padding:1px 6px;font-size:14px;color:'+tc+';font-weight:900;">'+tier+'</span>'+
          '</div>'+
          '<div style="color:var(--muted);font-size:13px;margin-top:1px;">макс. буст '+boost+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="text-align:right;">'+
        '<div style="color:'+tc+';font-size:18px;font-weight:900;">'+balance+'</div>'+
        '<div style="color:var(--muted);font-size:15px;">RCW</div>'+
      '</div>'+
    '</div>'+
    actHtml+
  '</div>';
}

function rReiki(){
  return '<div class="tc">'+
    '<div style="margin-bottom:18px;">'+
      '<div class="gtitle" style="background:linear-gradient(90deg,#cc44ff,#ff44cc);">REIKI MAGIC</div>'+
      '<div style="color:var(--muted);font-size:13px;letter-spacing:2px;">TON DAILY · ETH PREMIUM</div>'+
    '</div>'+
    rcwBlock("🔮","RCW TON","DAILY","#cc44ff",bal.RCW_T,"+30%",[
      {l:"💊 HEAL CARD",c:5,s:"Лечение +20% HP"},
      {l:"⚡ DAILY BOOST",c:20,s:"+30% power, 1 бой"},
      {l:"📋 DAILY QUEST",c:10,s:"+MDC награда"}])+
    rcwBlock("🧙","RCW ETH","PREMIUM","#ff44cc",bal.RCW_E,"+100%",[
      {l:"🧙 WIZARD NFT",c:1000,s:"Легендарная карта +20%"},
      {l:"💥 REIKI BLAST",c:200,s:"+100% power, 1 бой"},
      {l:"👑 VIP ACCESS",c:500,s:"VIP турнир 10,000 MDC"}])+
    '<div style="background:linear-gradient(135deg,#1a0033,#33001a);'+
      'border:1px solid #cc44ff33;border-radius:14px;padding:16px;">'+
      '<div style="font-weight:900;font-size:15px;letter-spacing:2px;margin-bottom:8px;">⚡ СИНЕРГИЯ</div>'+
      '<div style="color:#888;font-size:14px;line-height:1.8;">'+
        '<span style="color:#cc44ff;">TON +30%</span> × '+
        '<span style="color:#ff44cc;">ETH +100%</span> = '+
        '<span style="color:#fff;font-weight:700;">до +230% силы 🚀</span>'+
      '</div>'+
    '</div>'+
  '</div>';
}
function rcwA(l,s,c,chain,color){
  if(!wallet){notif("⚠ Подключи кошелёк!","#ff4444");return;}
  notif("✨ "+l+" — "+s+"! -"+c+" RCW ("+chain+")",color);
}

// ── TOKENS ────────────────────────────────────────────────────────────
function rTokens(){
  var cc={TON:"#00ccff",ETH:"#8888ff",SOL:"#cc44ff"};
  var rows=[
    {k:"MDC",ch:"TON",a:TK.MDC.ton,dex:"DeDust",url:"https://dedust.io"},
    {k:"MDC",ch:"SOL",a:TK.MDC.sol,dex:"pump.fun",url:"https://pump.fun"},
    {k:"GEO",ch:"TON",a:TK.GEO.ton,dex:"DeDust",url:"https://dedust.io"},
    {k:"RCW_T",ch:"TON",a:TK.RCW_T.ton,dex:"DeDust",url:"https://dedust.io"},
    {k:"RCW_E",ch:"ETH",a:TK.RCW_E.eth,dex:"Uniswap",url:"https://uniswap.org"},
  ];
  var html='<div class="tc">'+
    '<div style="margin-bottom:18px;">'+
      '<div class="gtitle" style="background:linear-gradient(90deg,#ffcc00,#ff6b00);">TOKEN HUB</div>'+
      '<div style="color:var(--muted);font-size:13px;letter-spacing:2px;">5 ТОКЕНОВ · 3 БЛОКЧЕЙНА</div>'+
    '</div>';
  Object.entries(TK).forEach(function(entry){
    var k=entry[0],t=entry[1];
    var myRows=rows.filter(function(r){return r.k===k;});
    html+='<div class="card" style="border-color:'+t.c+'22;margin-bottom:12px;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<span style="font-size:28px;filter:drop-shadow(0 0 8px '+t.c+');">'+t.e+'</span>'+
          '<div><div style="color:'+t.c+';font-weight:900;font-size:14px;">'+t.n+'</div>'+
            '<div style="color:var(--muted);font-size:13px;margin-top:2px;">'+t.role+'</div></div>'+
        '</div>'+
        '<div style="text-align:right;">'+
          '<div style="color:'+t.c+';font-size:16px;font-weight:900;">'+(bal[k]||0).toLocaleString()+'</div>'+
          '<div style="color:var(--muted);font-size:15px;">'+t.s+'</div>'+
        '</div>'+
      '</div>'+
      myRows.map(function(r){
        return '<div style="background:#111;border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:6px;">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">'+
            '<span style="color:'+cc[r.ch]+';font-size:13px;font-weight:700;">'+r.ch+'</span>'+
            '<div style="display:flex;gap:5px;">'+
              '<button class="btn-s" onclick="cpA(\''+r.a+'\')" style="background:#1a1a1a;border:1px solid #333;color:#aaa;font-size:15px;padding:4px 8px;">COPY</button>'+
              '<a href="'+r.url+'" target="_blank" style="background:'+t.c+'11;border:1px solid '+t.c+'33;border-radius:6px;color:'+t.c+';font-size:15px;padding:4px 8px;text-decoration:none;font-weight:700;">'+r.dex+' ↗</a>'+
            '</div>'+
          '</div>'+
          '<div style="color:#555;font-size:15px;word-break:break-all;line-height:1.4;">'+r.a+'</div>'+
        '</div>';
      }).join("")+
    '</div>';
  });
  return html+'</div>';
}

// ── INIT ──────────────────────────────────────────────────────────────
function render(){
  var fns={arena:rArena,kingdoms:rKingdoms,cards:rCards,reiki:rReiki,tokens:rTokens};
  document.getElementById("content").innerHTML=(fns[tab]||rArena)();
}

render();
</script>
